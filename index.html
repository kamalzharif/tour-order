<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Sistem Order Makan — Grup Tour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a}
.page{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.header-green{background:#1a6b3c;padding:36px 24px 28px;text-align:center}
.header-green h1{font-size:22px;font-weight:600;color:#fff;margin-bottom:4px}
.header-green p{font-size:13px;color:rgba(255,255,255,0.8)}
.sticky-top{padding:14px 16px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:10;display:flex;align-items:center;gap:10px}
.sticky-top h2{font-size:17px;font-weight:600;flex:1}
.back-btn{font-size:22px;background:none;border:none;cursor:pointer;color:#1a1a1a;line-height:1;padding:0}
.body{padding:20px 16px 120px}
.btn-primary{width:100%;padding:16px 0;font-size:15px;border-radius:14px;cursor:pointer;background:#1a6b3c;border:none;color:#fff;font-weight:600;margin-bottom:10px}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{width:100%;padding:14px 0;font-size:14px;border-radius:14px;cursor:pointer;background:#f5f5f5;border:1px solid #ddd;color:#1a1a1a;margin-bottom:10px}
.btn-danger{width:100%;padding:12px 0;font-size:13px;border-radius:12px;cursor:pointer;background:#fff;border:1px solid #e53935;color:#e53935;margin-bottom:8px}
.btn-copy{width:100%;padding:12px 0;font-size:13px;border-radius:10px;cursor:pointer;background:#fff;border:1px solid #1a6b3c;color:#1a6b3c;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.form-label{font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600}
.form-input{width:100%;padding:13px 14px;font-size:15px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;margin-bottom:12px;outline:none}
.form-input:focus{border-color:#1a6b3c}
.counter-row{display:flex;align-items:center;gap:0;margin-bottom:20px;background:#f5f5f5;border-radius:12px;padding:4px;width:fit-content}
.cnt-btn{width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;background:#fff;border:1px solid #eee;color:#1a1a1a;line-height:1}
.cnt-val{font-size:18px;font-weight:600;width:48px;text-align:center}
.sesi-header{background:#1a6b3c;color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:12px}
.sesi-header h3{font-size:15px;font-weight:600;margin-bottom:2px}
.sesi-header p{font-size:12px;opacity:0.85}
.sesi-note{background:#fff8e1;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#856404;border-left:3px solid #ffc107}
.instruction-box{background:#e8f5e9;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:#1a6b3c;border-left:3px solid #1a6b3c;line-height:1.5}
/* Person tabs */
.person-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.person-tabs::-webkit-scrollbar{height:3px}
.person-tabs::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.ptab{padding:8px 16px;border-radius:20px;border:2px solid #eee;background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;color:#888;transition:all 0.15s;flex-shrink:0}
.ptab.active{border-color:#1a6b3c;background:#1a6b3c;color:#fff}
.ptab.done{border-color:#1a6b3c;background:#f0f9f4;color:#1a6b3c}
.ptab.done::after{content:" ✓";font-size:11px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.menu-card{border-radius:12px;border:2px solid #eee;overflow:hidden;cursor:pointer;background:#fff;transition:border 0.1s}
.menu-card.selected{border-color:#1a6b3c;background:#f0f9f4}
.menu-img-wrap{position:relative;width:100%;height:90px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.menu-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.menu-check{position:absolute;top:5px;right:5px;background:#1a6b3c;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.menu-info{padding:7px 8px 9px}
.menu-name{font-size:11px;font-weight:600;color:#1a1a1a;line-height:1.3;margin-bottom:1px}
.menu-price{font-size:11px;color:#1a6b3c;font-weight:600}
.menu-desc{font-size:10px;color:#888;line-height:1.3;margin-top:1px}
.error-box{background:#fdecea;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:13px;color:#c62828}
.fixed-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 16px 24px;background:#fff;border-top:1px solid #eee}
.progress-bar{display:flex;gap:4px;margin-bottom:16px}
.progress-step{flex:1;height:4px;border-radius:2px;background:#eee}
.progress-step.done{background:#1a6b3c}
.progress-step.active{background:#90c7a8}
.success-wrap{text-align:center;padding:50px 24px}
.success-icon{font-size:56px;margin-bottom:14px}
.summary-box{background:#f9f9f9;border-radius:12px;padding:14px;margin:14px 0;text-align:left}
.summary-box h4{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a6b3c}
.summary-sesi{margin-bottom:10px}
.summary-sesi-title{font-size:11px;color:#1a6b3c;font-weight:600;text-transform:uppercase;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #eee}
.summary-row{font-size:12px;color:#555;padding:3px 0;display:flex;justify-content:space-between}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{background:#f5f5f5;border-radius:12px;padding:12px 8px;flex:1;text-align:center}
.stat-label{font-size:10px;color:#888;margin-bottom:3px}
.stat-val{font-size:18px;font-weight:600}
.section-title{font-size:14px;font-weight:600;margin-bottom:8px;margin-top:16px}
.list-card{background:#f5f5f5;border-radius:12px;overflow:hidden;margin-bottom:12px}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #eee}
.list-item:last-child{border-bottom:none}
.pax-badge{font-size:11px;font-weight:600;background:#e8f5e9;color:#1a6b3c;border-radius:20px;padding:2px 10px;white-space:nowrap}
.order-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.order-name{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.order-sesi{margin-bottom:5px}
.order-sesi-title{font-size:10px;color:#1a6b3c;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.order-sesi-val{font-size:12px;color:#333}
.del-btn{font-size:11px;color:#e53935;background:none;border:none;cursor:pointer}
.trip-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:13px 14px;margin-bottom:8px}
.trip-name{font-size:14px;font-weight:600;margin-bottom:3px}
.trip-meta{font-size:11px;color:#888;margin-bottom:8px}
.trip-link{font-size:10px;color:#1a6b3c;background:#f0f9f4;padding:5px 10px;border-radius:8px;word-break:break-all;margin-bottom:8px;display:block}
.trip-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333}
.btn-sm.green{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.btn-sm.red{border-color:#e53935;color:#e53935}
.add-box{background:#f9f9f9;border-radius:12px;padding:14px;margin-bottom:14px}
.lock-wrap{padding:40px 24px}
.loading{text-align:center;padding:4rem;color:#888;font-size:14px}
.tab-row{display:flex;gap:0;border-bottom:2px solid #eee;margin-bottom:14px}
.tab-btn{flex:1;padding:10px 0;font-size:13px;background:none;border:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#1a6b3c;border-bottom-color:#1a6b3c;font-weight:600}
.export-section{background:#f9f9f9;border-radius:12px;padding:14px;margin-bottom:14px}
.export-section h4{font-size:13px;font-weight:600;margin-bottom:10px}
.vegan-tag{font-size:9px;background:#e8f5e9;color:#1a6b3c;border-radius:10px;padding:1px 5px;margin-left:3px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
/* Admin menu img */
.admin-menu-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.admin-menu-row:last-child{border-bottom:none}
.admin-thumb{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.admin-thumb img{width:100%;height:100%;object-fit:cover}
.upload-lbl{font-size:11px;color:#1a6b3c;cursor:pointer;display:block;margin-top:3px}
</style>
</head>
<body>
<div class="page" id="app"><div class="loading">🍱<br><br>Memuatkan...</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,onSnapshot,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db=getFirestore(initializeApp({apiKey:"AIzaSyBdfyI1IHccekotNNRYwlr3U9JTkVc2uWI",authDomain:"tour-order.firebaseapp.com",projectId:"tour-order",storageBucket:"tour-order.firebasestorage.app",messagingSenderId:"411616788552",appId:"1:411616788552:web:fd0a63dbe84c64334d987d"}));
const PASS="admin123";
const SESI=[
  {id:"fuji",nama:"🍱 Bento di Fuji",note:"Harga sudah termasuk cukai 10%",showPrice:true,menus:[
    {id:1,name:"Yellow Chicken",price:1320,desc:"Rice Menu"},
    {id:2,name:"Kawaguchiko Curry",price:1320,desc:"Rice Menu — Most Popular"},

    {id:6,name:"Spicy Noodle 🌶🌶",price:1210,desc:"Pedas"},
    {id:7,name:"Spicy Noodle 🌶🌶🌶",price:1320,desc:"Sangat pedas"},
    {id:8,name:"Katsuretu Kawaguchiko Curry",price:1650,desc:"Fujisan Katsuretu Beef"},
    {id:9,name:"Miso Katsuretu Shingen",price:1320,desc:"Fujisan Katsuretu Beef"},
    {id:10,name:"Wrap Original (M)",price:880,desc:"Chicken & Vegetables"},
    {id:11,name:"Wrap Spicy (M)",price:880,desc:"Chicken & Vegetables"},
    {id:12,name:"Wrap Curry (M)",price:880,desc:"Chicken & Vegetables"},
    {id:13,name:"Wrap Teriyaki (M)",price:880,desc:"Chicken & Vegetables"},
    {id:14,name:"Wrap Wasabi (M)",price:880,desc:"Chicken & Vegetables"},
    {id:15,name:"Wrap Miso (M)",price:880,desc:"Chicken & Vegetables"},
  ]},
  {id:"nara",nama:"🍛 Makan Tengahari di Nara",note:"",showPrice:true,menus:[
    {id:1,name:"Beef Biryani",price:1700},{id:2,name:"Beef Khichuri",price:1700},
    {id:3,name:"Chicken Biryani",price:1500},{id:4,name:"Chicken Chili Rice",price:1500},
    {id:5,name:"Chicken Khichuri",price:1600},{id:6,name:"Chicken Korma Rice",price:1500},
    {id:7,name:"Lamb Biryani",price:1600},{id:8,name:"Lamb Khichuri",price:1700},
    {id:9,name:"Nasi Goreng",price:1600},{id:10,name:"Chicken Polao",price:1500},
    {id:11,name:"Shrimp Biryani",price:1500},{id:12,name:"Tandoori Biryani",price:1500},
    {id:13,name:"Vegetables Biryani",price:1500,isVegan:true},{id:14,name:"Vegetables Curry Rice",price:1500,isVegan:true},
  ]},
  {id:"namba",nama:"🍜 Makan Malam di Namba/Dotonbori",note:"Semua order: Regular size + Karaage 3pc (¥400)",showPrice:false,menus:[
    {id:1,name:"Shoyu Ramen",price:1000,desc:"Regular + Karaage 3pc ¥400"},
    {id:2,name:"Miso Ramen",price:1000,desc:"Regular + Karaage 3pc ¥400"},
  ]},
];

let S={
  view:"home",tripId:null,tripData:null,trips:[],orders:[],
  adminUnlocked:false,adminPass:"",adminError:"",adminTab:"trips",selectedTripId:null,
  orderForm:{name:"",pax:1,persons:[]},orderStep:1,currentSesiIdx:0,activePerson:0,
  submitted:false,orderError:"",loading:true,
  newTrip:{nama:"",tarikh:"",tarikhMula:"",mod:"tren",pax:""},
  addSpecial:"",imgs:{},uploadingImg:{},
};

function toast(m="✓ Disalin!"){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function copy(txt){navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>toast()):((ta=>{ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast();})(document.createElement("textarea")));}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function tripLink(id){return`${location.origin}${location.pathname}?trip=${id}`;}
function f2b(file){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=j;fr.readAsDataURL(file);});}
function addDays(ds,days){if(!ds)return'—';const d=new Date(ds);d.setDate(d.getDate()+days);return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function getWaktu(trip,sid){const m=trip.mod||"tren";if(sid==="nara")return m==="tren"?"11:00am":"11:30am";if(sid==="namba")return m==="tren"?"5:00pm":"5:30pm";return"";}
function getTarikhSesi(trip,sid){if(!trip.tarikhMula)return'—';if(sid==="nara"||sid==="namba")return addDays(trip.tarikhMula,1);if(sid==="fuji")return addDays(trip.tarikhMula,3);return'—';}

async function loadTrips(){try{const s=await getDocs(collection(db,"trips"));S.trips=s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){}}
async function loadOrders(tid){try{const s=await getDocs(collection(db,"trips",tid,"orders"));S.orders=s.docs.map(d=>d.data());}catch(e){S.orders=[];}}
async function loadImgs(){try{const d=await getDoc(doc(db,"config","menuImgs"));if(d.exists())S.imgs=d.data();}catch(e){S.imgs={};}}

function listenOrders(tid){onSnapshot(collection(db,"trips",tid,"orders"),s=>{S.orders=s.docs.map(d=>d.data());render();});}
async function saveOrder(tid,o){await setDoc(doc(db,"trips",tid,"orders",o.id),o);}
async function delOrder(tid,oid){await deleteDoc(doc(db,"trips",tid,"orders",oid));}
async function saveTrip(t){await setDoc(doc(db,"trips",t.id),t);}
async function delTrip(tid){const s=await getDocs(collection(db,"trips",tid,"orders"));for(const d of s.docs)await deleteDoc(d.ref);await deleteDoc(doc(db,"trips",tid));}
async function saveImgs(){await setDoc(doc(db,"config","menuImgs"),S.imgs);}

function buildRestoran1Sesi(trip,orders,sesiId){
  const sl=trip.sesi||SESI;const s=sl.find(x=>x.id===sesiId);if(!s)return"";
  const cnt={};const pm={};
  orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p[s.id];if(i){cnt[i.name]=(cnt[i.name]||0)+1;pm[i.name]=i.price||0;}}));
  if(sesiId==="fuji"){
    const tarikhFuji=getTarikhSesi(trip,"fuji");
    const CATS=[
      {label:"🥩 KATSURETU MENU",items:["Katsuretu Kawaguchiko Curry","Miso Katsuretu Shingen"]},
      {label:"🍚 RICE DISHES",items:["Yellow Chicken","Kawaguchiko Curry","Rice Curry","Kebab Rice"]},
      {label:"🌯 WRAP / KEBAB MENU",items:["Wrap Original (M)","Wrap Spicy (M)","Wrap Curry (M)","Wrap Teriyaki (M)","Wrap Wasabi (M)","Wrap Miso (M)"]},
      {label:"🍜 NOODLES",items:["Spicy Noodle 🌶","Spicy Noodle 🌶🌶","Spicy Noodle 🌶🌶🌶"]},
    ];
    let txt=`🍱 *BENTO ORDER — FUJI*\n📌 Trip: ${trip.nama}\n📅 Date: ${tarikhFuji}\n${'─'.repeat(28)}\n\n`;
    let grand=0;
    CATS.forEach(cat=>{
      const ci=cat.items.filter(n=>cnt[n]);if(!ci.length)return;
      txt+=`*${cat.label}*\n`;let sub=0;
      ci.forEach(n=>{const c=cnt[n];const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: *${c} pax* (¥${p.toLocaleString()} × ${c} = ¥${tot.toLocaleString()})\n`;});
      txt+=`  Subtotal: ¥${sub.toLocaleString()}\n\n`;grand+=sub;
    });
    txt+=`${'─'.repeat(28)}\n💴 *GRAND TOTAL: ¥${grand.toLocaleString()}*\n`;
    return txt;
  }
  if(sesiId==="nara"){
    const mod=trip.mod||"tren";
    let txt=`🍛 *LUNCH ORDER — NARA*\n📌 Trip: ${trip.nama}\n📅 Date: ${getTarikhSesi(trip,"nara")}\n⏰ Order time: ${getWaktu(trip,"nara")} (${mod==="tren"?"by train":"by bus"})\n${'─'.repeat(28)}\n\n`;
    if(!Object.keys(cnt).length){txt+=`  No orders yet.\n`;return txt;}
    let sub=0;
    Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: *${c} pax* (¥${p.toLocaleString()} × ${c} = ¥${tot.toLocaleString()})\n`;});
    txt+=`\n💴 *Total: ¥${sub.toLocaleString()}*\n`;return txt;
  }
  const mod=trip.mod||"tren";
  let txt=`🍜 *DINNER ORDER — NAMBA/DOTONBORI*\n📌 Trip: ${trip.nama}\n📅 Date: ${getTarikhSesi(trip,"namba")}\n⏰ Order time: ${getWaktu(trip,"namba")} (${mod==="tren"?"by train":"by bus"})\n${'─'.repeat(28)}\n\n`;
  if(!Object.keys(cnt).length){txt+=`  No orders yet.\n`;return txt;}
  const R=1000,K=400;const tp=Object.values(cnt).reduce((a,b)=>a+b,0);let rt=0;
  Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const tot=R*c;rt+=tot;txt+=`  • ${n} (Regular size)\n    ¥${R.toLocaleString()} × ${c} pax = ¥${tot.toLocaleString()}\n\n`;});
  const kt=K*tp;txt+=`  • Karaage 3pc\n    ¥${K.toLocaleString()} × ${tp} pax = ¥${kt.toLocaleString()}\n\n`;
  txt+=`${'─'.repeat(28)}\n🍜 Ramen total: ¥${rt.toLocaleString()}\n🍗 Karaage total: ¥${kt.toLocaleString()}\n💴 *GRAND TOTAL: ¥${(rt+kt).toLocaleString()}*\n`;
  return txt;
}
function buildLeader(trip,orders){
  const sl=trip.sesi||SESI;
  let txt=`👥 *ORDER UNTUK TOUR LEADER*\n📌 Trip: ${trip.nama}\n📅 ${trip.tarikh||'—'}\n${'─'.repeat(28)}\n\n`;
  orders.forEach((o,i)=>{
    txt+=`*${i+1}. ${o.name}*${(o.persons||[]).length>1?` (${o.persons.length} orang)`:''}\n`;
    const multi=(o.persons||[]).length>1;
    (o.persons||[]).forEach((p,pi)=>{
      if(multi)txt+=`  👤 Orang ${pi+1}:\n`;
      const ind=multi?'    ':'  ';
      sl.forEach(s=>{const item=p[s.id];txt+=`${ind}${s.nama}: ${item?item.name:'—'}`;if(item&&s.showPrice)txt+=` (¥${(item.price||0).toLocaleString()})`;if(s.id==="namba"&&item)txt+=` + Karaage 3pc (¥400)`;txt+=`\n`;});
    });
    let sf=0,sn=0;(o.persons||[]).forEach(p=>{const f=p["fuji"];const n=p["nara"];if(f)sf+=f.price||0;if(n)sn+=n.price||0;});
    txt+=`  💴 Fuji: ¥${sf.toLocaleString()} | Nara: ¥${sn.toLocaleString()} | *Jumlah: ¥${(sf+sn).toLocaleString()}*\n\n`;
  });
  let gf=0,gn=0;orders.forEach(o=>(o.persons||[]).forEach(p=>{const f=p["fuji"];const n=p["nara"];if(f)gf+=f.price||0;if(n)gn+=n.price||0;}));
  txt+=`${'─'.repeat(28)}\n💴 *JUMLAH KESELURUHAN*\n  🍱 Fuji: ¥${gf.toLocaleString()}\n  🍛 Nara: ¥${gn.toLocaleString()}\n  *TOTAL: ¥${(gf+gn).toLocaleString()}*\n`;
  return txt;
}
function buildRingkasan(trip,orders){
  const sl=trip.sesi||SESI;
  const tp=orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  let txt=`📊 *RINGKASAN KESELURUHAN*\n📌 Trip: ${trip.nama}\n📅 ${trip.tarikh||'—'}\n👥 ${orders.length} wakil | 🧑‍🤝‍🧑 ${tp} pax\n${'─'.repeat(28)}\n\n`;
  sl.forEach(s=>{
    txt+=`*${s.nama}*\n`;const cnt={};const pm={};
    orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p[s.id];if(i){cnt[i.name]=(cnt[i.name]||0)+1;pm[i.name]=i.price||0;}}));
    let sub=0;Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: ${c} pax${s.showPrice?` = ¥${tot.toLocaleString()}`:''}\n`;});
    if(s.showPrice&&sub>0)txt+=`  💴 Jumlah: ¥${sub.toLocaleString()}\n`;txt+=`\n`;});
  return txt;
}

function render(){
  const el=document.getElementById("app");
  if(S.loading){el.innerHTML=`<div class="loading">🍱<br><br>Memuatkan...</div>`;return;}
  if(S.view==="notfound"){el.innerHTML=`<div class="loading">❌<br><br>Link trip tidak sah.</div>`;return;}
  if(S.view==="home")el.innerHTML=renderHome();
  else if(S.view==="order")el.innerHTML=renderOrder();
  else if(S.view==="admin")el.innerHTML=renderAdmin();
  attachEvents();
}

function renderOrder(){
  const trip=S.tripData;if(!trip)return`<div class="loading">❌</div>`;
  const sesiList=trip.sesi||SESI;
  const pax=trip.pax||22;
  const totalPaxOrdered=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  const rem=pax-totalPaxOrdered;

  if(S.submitted){
    const o=S.orderForm;
    return`<div class="sticky-top"><h2>${trip.nama}</h2></div>
    <div class="success-wrap">
      <div class="success-icon">✅</div><h2>Pesanan Diterima!</h2>
      <p>Terima kasih, <b>${o.name}</b>.</p>

      <div class="summary-box"><h4>Ringkasan Pesanan</h4>
        ${sesiList.map(s=>`<div class="summary-sesi">
          <div class="summary-sesi-title">${s.nama}</div>
          ${(o.persons||[]).map((p,i)=>`<div class="summary-row"><span>${o.pax>1?`Orang ${i+1}`:o.name}</span><span>${p[s.id]?p[s.id].name:'—'}</span></div>`).join("")}
        </div>`).join("")}
      </div>
    </div>`;
  }

  if(S.orderStep===1){
    const totalSteps=sesiList.length+1;
    return`<div class="sticky-top"><h2>${trip.nama}</h2><span style="font-size:11px;background:#f0f9f4;color:#1a6b3c;border-radius:20px;padding:3px 10px">${trip.tarikh||''}</span></div>
    <div class="body">
      <div class="progress-bar">${Array.from({length:totalSteps}).map((_,i)=>`<div class="progress-step ${i===0?'active':''}"></div>`).join("")}</div>
      <p style="font-size:13px;color:#666;margin-bottom:16px">Slot tinggal: <b style="color:${rem<5?'#e53935':'#1a6b3c'}">${rem}</b> / ${pax}</p>

      <input class="form-input" id="order-name" placeholder="cth: Ahmad bin Ali" value="${S.orderForm.name}"/>
      <label class="form-label">Bilangan orang yang anda orderkan (termasuk diri sendiri)</label>
      <div class="counter-row">
        <button class="cnt-btn" id="cnt-minus">−</button>
        <div class="cnt-val">${S.orderForm.pax}</div>

      </div>
      ${S.orderError?`<div class="error-box">${S.orderError}</div>`:''}
    </div>
    <div class="fixed-bottom"><button class="btn-primary" id="next-step">Seterusnya →</button></div>`;
  }

  const sesiIdx=S.currentSesiIdx;
  const sesi=sesiList[sesiIdx];
  const totalSteps=sesiList.length+1;
  const persons=S.orderForm.persons||[];
  const ap=S.activePerson;
  const allFilled=persons.every(p=>p[sesi.id]);
  const isLast=sesiIdx===sesiList.length-1;

  // Person tabs
  const tabs=persons.map((p,i)=>{
    const filled=!!p[sesi.id];
    return`<button class="ptab ${ap===i?'active':filled?'done':''}" data-ptab="${i}">${persons.length>1?`Orang ${i+1}`:'Anda'}</button>`;
  }).join("");

  // Menu grid for active person
  const sel=persons[ap]?persons[ap][sesi.id]:null;
  const menuCards=sesi.menus.map(m=>{
    const isSel=sel&&sel.id===m.id;
    const imgSrc=S.imgs[`${sesi.id}_${m.id}`];
    return`<div class="menu-card ${isSel?'selected':''}" data-sesi="${sesi.id}" data-pid="${ap}" data-menuid="${m.id}">
      <div class="menu-img-wrap">
        ${imgSrc?`<img src="${imgSrc}" alt="${m.name}"/>`:`<span style="font-size:26px">🍽️</span>`}
        ${isSel?'<div class="menu-check">✓</div>':''}
      </div>
      <div class="menu-info">
        <div class="menu-name">${m.name}${m.isVegan?'<span class="vegan-tag">Vegan</span>':''}</div>
        ${sesi.showPrice?`<div class="menu-price">¥${m.price.toLocaleString()}</div>`:''}
        ${m.desc?`<div class="menu-desc">${m.desc}</div>`:''}
      </div>
    </div>`;
  }).join("");

  // Progress dots for persons
  const personProgress=persons.map((p,i)=>{
    const filled=!!p[sesi.id];
    return`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${filled?'#1a6b3c':'#ddd'};margin:0 2px"></span>`;
  }).join("");

  return`<div class="sticky-top"><h2>${trip.nama}</h2></div>
  <div class="body">
    <div class="progress-bar">${Array.from({length:totalSteps}).map((_,i)=>`<div class="progress-step ${i<sesiIdx+1?'done':i===sesiIdx+1?'active':''}"></div>`).join("")}</div>
    <div class="sesi-header"><h3>${sesi.nama}</h3>${sesi.note?`<p>${sesi.note}</p>`:''}</div>
    ${sesi.id==="namba"?`<div class="sesi-note">✅ Semua order termasuk Regular size + Karaage 3pc (¥400)</div>`:''}
    <div class="instruction-box">
      📋 <b>Arahan:</b> Pilih menu untuk setiap orang menggunakan tab di bawah.<br>
      Semua tab mesti dipilih sebelum boleh teruskan.
      <div style="margin-top:6px">${personProgress} <span style="font-size:11px;color:#1a6b3c">${persons.filter(p=>p[sesi.id]).length}/${persons.length} selesai</span></div>
    </div>
    <div class="person-tabs">${tabs}</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#1a1a1a">
      ${persons.length>1?`👤 Pilihan ${ap===0?'Anda (Orang 1)':`Orang ${ap+1}`}:`:'Pilihan Anda:'}
      ${persons[ap]&&persons[ap][sesi.id]?`<span style="color:#1a6b3c;font-size:12px;font-weight:600"> ✓ ${persons[ap][sesi.id].name}</span>`:'<span style="color:#aaa;font-size:12px;font-weight:400"> Belum dipilih</span>'}
    </div>
    <div class="menu-grid">${menuCards}</div>
    ${S.orderError?`<div class="error-box">${S.orderError}</div>`:''}
  </div>
  <div class="fixed-bottom">
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" id="prev-step" style="margin:0;flex:1;padding:14px 0">← Balik</button>
      <button class="btn-primary" id="next-step" style="margin:0;flex:2">${isLast?'✅ Hantar Pesanan':'Seterusnya →'}</button>
    </div>
  </div>`;
}

      <div class="order-sesi-val">${p[s.id]?p[s.id].name:'—'}${s.id==="namba"&&p[s.id]?' <span style="font-size:10px;color:#888">(Regular+Karaage)</span>':''}</div></div>`).join("")}`).join("")}
  </div>`).join("");

  return`<div class="sticky-top"><button class="back-btn" id="back">←</button><h2>Admin Panel</h2></div>
  <div class="body" style="padding-bottom:40px">
    <div class="tab-row">
      <button class="tab-btn" data-tab="trips">🗺️ Trip</button>
      <button class="tab-btn active" data-tab="orders">📋 Order</button>
    </div>
    ${tripSel}
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">Wakil</div><div class="stat-val">${orders.length}</div></div>
      <div class="stat-card"><div class="stat-label">Jumlah Pax</div><div class="stat-val">${totalPax}/${trip?trip.pax:22}</div></div>
      <div class="stat-card"><div class="stat-label">Tinggal</div><div class="stat-val">${trip?(trip.pax||22)-totalPax:0}</div></div>
    </div>
    <div class="export-section">
      <h4>📤 Eksport & Kongsi</h4>
      <div style="font-size:12px;color:#666;margin-bottom:6px;font-weight:600">Untuk Restoran:</div>
      <button class="btn-copy" id="copy-fuji">🍱 Copy — Restoran Fuji</button>
      <button class="btn-copy" id="copy-nara">🍛 Copy — Restoran Nara</button>
      <button class="btn-copy" id="copy-namba">🍜 Copy — Restoran Namba</button>
      <div style="font-size:12px;color:#666;margin:10px 0 6px;font-weight:600">Lain-lain:</div>
      <button class="btn-copy" id="copy-leader">👥 Copy — Untuk Tour Leader</button>
      <button class="btn-copy" id="copy-ringkasan">📊 Copy — Ringkasan Keseluruhan</button>
    </div>
    <div class="section-title">Ringkasan Mengikut Sesi</div>${summary}
    <div class="add-box">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">➕ Tambah Menu Khas (Namba)</div>
      <input class="form-input" id="special-nama" placeholder="cth: Vegan Ramen / Special Request" value="${S.addSpecial}"/>
      <button class="btn-primary" id="add-special" style="margin-bottom:0">Tambah Menu</button>
    </div>
    <div class="section-title">Senarai Pesanan</div>${ordersList}
    <button class="btn-danger" id="reset-trip">🗑 Reset Semua Pesanan Trip Ini</button>
  </div>`;
}

function attachEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  on("go-admin","click",()=>{S.view="admin";loadTrips().then(()=>{if(S.trips.length>0)S.selectedTripId=S.trips[0].id;render();});});
  on("back","click",()=>{if(S.view==="admin"&&S.adminUnlocked)S.adminUnlocked=false;S.view="home";render();});
  on("back-to-trips","click",()=>{S.adminTab="trips";render();});
  on("admin-pass","input",e=>S.adminPass=e.target.value);
  on("admin-login","click",()=>{
    if(S.adminPass===PASS){S.adminUnlocked=true;S.adminError="";loadTrips().then(()=>{if(S.trips.length>0)S.selectedTripId=S.trips[0].id;render();});}
    else{S.adminError="Kata laluan salah.";render();}
  });
  on("admin-pass","keydown",e=>{if(e.key==="Enter")$("admin-login")?.click();});

  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{
    S.adminTab=b.dataset.tab;
    if(S.adminTab==="orders"&&S.trips.length>0){S.selectedTripId=S.selectedTripId||S.trips[0].id;loadOrders(S.selectedTripId).then(render);}
    else if(S.adminTab==="imgs"){S.pickedFiles=[];S.pendingImgs={};S.imgPreviews=[];S.selectingFileIdx=null;render();}
    else render();
  }));
  on("trip-selector","change",async e=>{S.selectedTripId=e.target.value;await loadOrders(S.selectedTripId);render();});
  on("new-trip-nama","input",e=>S.newTrip.nama=e.target.value);
  on("new-trip-tarikh","input",e=>S.newTrip.tarikh=e.target.value);
  on("new-trip-tarikh-mula","input",e=>S.newTrip.tarikhMula=e.target.value);
  on("new-trip-mod","change",e=>S.newTrip.mod=e.target.value);
  on("new-trip-pax","input",e=>S.newTrip.pax=e.target.value);
  on("add-trip","click",async()=>{
    if(!S.newTrip.nama.trim()){alert("Sila masukkan nama trip.");return;}
    if(!S.newTrip.tarikhMula){alert("Sila masukkan tarikh mula di Osaka.");return;}
    const id=genId();
    const t={id,nama:S.newTrip.nama,tarikh:S.newTrip.tarikh,tarikhMula:S.newTrip.tarikhMula,mod:S.newTrip.mod||"tren",pax:parseInt(S.newTrip.pax)||22,sesi:SESI};
    await saveTrip(t);S.trips.push(t);S.newTrip={nama:"",tarikh:"",tarikhMula:"",mod:"tren",pax:""};
    alert(`✅ Trip "${t.nama}" berjaya dicipta!\n\n🔗 Link:\n${tripLink(id)}`);render();
  });

  // Manage images — now via tab, remove old button handler
  on("bulk-file-pick","change",async e=>{
    S.pickedFiles=Array.from(e.target.files);
    S.pendingImgs={};S.selectingFileIdx=null;
    S.imgPreviews=await Promise.all(S.pickedFiles.map(f=>f2b(f)));
    render();
  });

  // Click image thumbnail → open modal
  document.querySelectorAll(".img-grid-item").forEach(item=>item.addEventListener("click",()=>{
    S.selectingFileIdx=parseInt(item.dataset.fileidx);render();
  }));

  // Close modal
  on("close-modal","click",()=>{S.selectingFileIdx=null;render();});
  on("menu-modal-overlay","click",e=>{if(e.target.id==="menu-modal-overlay"){S.selectingFileIdx=null;render();}});

  // Select menu from modal
  document.querySelectorAll(".modal-menu-item").forEach(item=>item.addEventListener("click",async()=>{
    const key=item.dataset.key;const fi=parseInt(item.dataset.fileidx);
    // Remove any existing assignment for this key or this fileIdx
    Object.keys(S.pendingImgs).forEach(k=>{if(S.pendingImgs[k].fileIdx===fi||k===key)delete S.pendingImgs[k];});
    const preview=S.imgPreviews[fi];
    S.pendingImgs[key]={fileIdx:fi,preview,file:S.pickedFiles[fi],filename:S.pickedFiles[fi].name};
    S.selectingFileIdx=null;render();
  }));

  // Remove assignment
  on("remove-assignment","click",()=>{
    const fi=S.selectingFileIdx;
    Object.keys(S.pendingImgs).forEach(k=>{if(S.pendingImgs[k].fileIdx===fi)delete S.pendingImgs[k];});
    S.selectingFileIdx=null;render();
  });

  // Save all images
  on("save-all-imgs","click",async()=>{
    const keys=Object.keys(S.pendingImgs);
    if(!keys.length){alert("Tiada gambar untuk disimpan.");return;}
    toast("⏳ Menyimpan...");
    for(const key of keys){
      const b64=await f2b(S.pendingImgs[key].file);S.imgs[key]=b64;
    }
    await saveImgs();
    S.pendingImgs={};S.pickedFiles=[];S.imgPreviews=[];
    toast(`✓ ${keys.length} gambar berjaya disimpan!`);render();
  });

  document.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",()=>{navigator.clipboard.writeText(b.dataset.copy).then(()=>toast("✓ Link disalin!"));}));
  document.querySelectorAll("[data-view-trip]").forEach(b=>b.addEventListener("click",async()=>{S.selectedTripId=b.dataset.viewTrip;S.adminTab="orders";await loadOrders(S.selectedTripId);render();}));
  document.querySelectorAll("[data-del-trip]").forEach(b=>b.addEventListener("click",async()=>{if(!confirm("Padam trip ini?"))return;await delTrip(b.dataset.delTrip);S.trips=S.trips.filter(t=>t.id!==b.dataset.delTrip);render();}));
  document.querySelectorAll("[data-del-order]").forEach(b=>b.addEventListener("click",async()=>{const tid=S.selectedTripId||S.tripId;await delOrder(tid,b.dataset.delOrder);S.orders=S.orders.filter(o=>o.id!==b.dataset.delOrder);render();}));
  on("reset-trip","click",async()=>{
    if(!confirm("Padam SEMUA pesanan?"))return;
    const tid=S.selectedTripId;const snap=await getDocs(collection(db,"trips",tid,"orders"));
    for(const d of snap.docs)await deleteDoc(d.ref);S.orders=[];render();
  });
  on("copy-fuji","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)copy(buildRestoran1Sesi(t,S.orders,"fuji"));});
  on("copy-nara","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)copy(buildRestoran1Sesi(t,S.orders,"nara"));});
  on("copy-namba","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)copy(buildRestoran1Sesi(t,S.orders,"namba"));});
  on("copy-leader","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)copy(buildLeader(t,S.orders));});
  on("copy-ringkasan","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)copy(buildRingkasan(t,S.orders));});
  on("special-nama","input",e=>S.addSpecial=e.target.value);
  on("add-special","click",async()=>{
    const nama=S.addSpecial.trim();if(!nama)return;
    const tid=S.selectedTripId;const trip=S.trips.find(t=>t.id===tid);if(!trip)return;
    const sesi=trip.sesi||SESI;const namba=sesi.find(s=>s.id==="namba");if(!namba)return;
    namba.menus.push({id:Date.now(),name:nama,price:1000,desc:"Special/Vegan",isSpecial:true});
    await setDoc(doc(db,"trips",tid),trip);S.addSpecial="";toast(`✓ "${nama}" ditambah!`);render();
  });

  // Order flow
  on("order-name","input",e=>S.orderForm.name=e.target.value);
  on("cnt-minus","click",()=>{S.orderForm.pax=Math.max(1,S.orderForm.pax-1);render();});
  on("cnt-plus","click",()=>{
    const trip=S.tripData;const pax=trip?trip.pax:22;
    const tp=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
    S.orderForm.pax=Math.min(S.orderForm.pax+1,pax-tp);render();
  });

  // Person tabs
  document.querySelectorAll("[data-ptab]").forEach(b=>b.addEventListener("click",()=>{S.activePerson=parseInt(b.dataset.ptab);render();}));

  on("next-step","click",async()=>{
    const trip=S.tripData;const sl=trip.sesi||SESI;
    const pax=trip?trip.pax:22;
    const tp=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);const rem=pax-tp;
    if(S.orderStep===1){
      const name=($("order-name")||{}).value?.trim()||S.orderForm.name.trim();
      S.orderForm.name=name;
      if(!name){S.orderError="Sila masukkan nama anda.";render();return;}
      if(S.orders.find(o=>o.name.toLowerCase()===name.toLowerCase())){S.orderError="Nama ini sudah membuat pesanan.";render();return;}
      if(rem<=0){S.orderError="Maaf, slot pesanan sudah penuh.";render();return;}
      if(S.orderForm.pax>rem){S.orderError=`Hanya ${rem} slot tinggal.`;render();return;}
      S.orderForm.persons=Array.from({length:S.orderForm.pax},()=>({}));
      S.currentSesiIdx=0;S.activePerson=0;S.orderError="";S.orderStep=2;render();
    } else {
      const sesi=sl[S.currentSesiIdx];
      const allFilled=S.orderForm.persons.every(p=>p[sesi.id]);
      if(!allFilled){
        const missing=S.orderForm.persons.findIndex(p=>!p[sesi.id]);
        S.activePerson=missing;S.orderError=`Sila pilih menu untuk semua ${S.orderForm.pax} orang.`;render();return;
      }
      S.orderError="";
      if(S.currentSesiIdx===sl.length-1){
        const order={id:genId(),name:S.orderForm.name,persons:S.orderForm.persons};
        await saveOrder(S.tripId,order);S.submitted=true;render();
      } else {
        S.currentSesiIdx++;S.activePerson=0;render();
      }
    }
  });
  on("prev-step","click",()=>{
    if(S.currentSesiIdx>0){S.currentSesiIdx--;S.activePerson=0;S.orderError="";}
    else{S.orderStep=1;S.orderError="";}
    render();
  });
  document.querySelectorAll(".menu-card").forEach(c=>c.addEventListener("click",()=>{
    const sid=c.dataset.sesi;const pid=parseInt(c.dataset.pid);const mid=parseInt(c.dataset.menuid);
    const trip=S.tripData;const sl=trip.sesi||SESI;
    const sesi=sl.find(s=>s.id===sid);if(!sesi)return;
    const menu=sesi.menus.find(m=>m.id===mid);if(!menu)return;
    if(!S.orderForm.persons[pid])S.orderForm.persons[pid]={};
    S.orderForm.persons[pid][sid]=menu;S.orderError="";
    // Auto-advance to next unfilled person
    const persons=S.orderForm.persons;
    const next=persons.findIndex((p,i)=>i>pid&&!p[sid]);
    if(next!==-1)S.activePerson=next;
    render();
  }));
}

window.addEventListener("DOMContentLoaded",async()=>{
  const params=new URLSearchParams(location.search);const tid=params.get("trip");
  if(tid){
    try{
      const d=await getDoc(doc(db,"trips",tid));
      if(d.exists()){
        S.tripId=tid;S.tripData={id:tid,...d.data()};
        await loadOrders(tid);await loadImgs();listenOrders(tid);S.view="order";
      } else S.view="notfound";
    }catch(e){S.view="notfound";}
  }
  await loadTrips();await loadImgs();if(S.trips.length>0)S.selectedTripId=S.trips[0].id;
  S.loading=false;render();
});
</script>
</body>
</html>
