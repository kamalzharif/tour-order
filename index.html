.ta{display:flex;gap:6px;flex-wrap:wrap}

.bsm.g{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.bsm.r{border-color:#e53935;color:#e53935}
.ab{background:#f9f9f9;border-radius:12px;padding:14px;margin-bottom:14px}
.lw{padding:40px 24px}
.ld{text-align:center;padding:4rem;color:#888;font-size:14px}
.tr{display:flex;gap:0;border-bottom:2px solid #eee;margin-bottom:14px}
.tb{flex:1;padding:10px 0;font-size:13px;background:none;border:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px}
.tb.active{color:#1a6b3c;border-bottom-color:#1a6b3c;font-weight:600}
.es{background:#f9f9f9;border-radius:12px;padding:14px;margin-bottom:14px}
.es h4{font-size:13px;font-weight:600;margin-bottom:10px}
.vt{font-size:9px;background:#e8f5e9;color:#1a6b3c;border-radius:10px;padding:1px 5px;margin-left:3px}
.tt{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.tt.show{opacity:1}
.amr{background:#fff3e0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#e65100;border-left:3px solid #ff9800}
.igr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.igr:last-child{border-bottom:none}
.ith{width:52px;height:52px;border-radius:10px;overflow:hidden;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.ith img{width:100%;height:100%;object-fit:cover}
</style>

<body>
<div class="page" id="app"><div class="ld">🍱<br><br>Memuatkan...</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,onSnapshot,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db=getFirestore(initializeApp({apiKey:"AIzaSyBdfyI1IHccekotNNRYwlr3U9JTkVc2uWI",authDomain:"tour-order.firebaseapp.com",projectId:"tour-order",storageBucket:"tour-order.firebasestorage.app",messagingSenderId:"411616788552",appId:"1:411616788552:web:fd0a63dbe84c64334d987d"}));

const PASS="admin123";
const LPASS="leader123";

const SESI=[
  {id:"fuji",nama:"🍱 Bento di Fuji",note:"Harga sudah termasuk cukai 10%",showPrice:true,menus:[

    {id:14,name:"Wrap Wasabi (M)",price:880,desc:"Chicken & Vegetables"},
    {id:15,name:"Wrap Miso (M)",price:880,desc:"Chicken & Vegetables"},
  ]},
  {id:"nara",nama:"🍛 Makan Tengahari di Nara",note:"",showPrice:true,menus:[
    {id:1,name:"Beef Biryani",price:1700},{id:2,name:"Beef Khichuri",price:1700},
    {id:3,name:"Chicken Biryani",price:1500},{id:4,name:"Chicken Chili Rice",price:1500},
    {id:5,name:"Chicken Khichuri",price:1600},{id:6,name:"Chicken Korma Rice",price:1500},
    {id:7,name:"Lamb Biryani",price:1600},{id:8,name:"Lamb Khichuri",price:1700},
    {id:9,name:"Nasi Goreng",price:1600},{id:10,name:"Chicken Polao",price:1500},
    {id:11,name:"Shrimp Biryani",price:1500},{id:12,name:"Tandoori Biryani",price:1500},
    {id:13,name:"Vegetables Biryani",price:1500,isVegan:true},{id:14,name:"Vegetables Curry Rice",price:1500,isVegan:true},
  ]},
  {id:"namba",nama:"🍜 Makan Malam di Namba/Dotonbori",note:"Semua order: Regular size + Karaage 3pc (¥400)",showPrice:false,menus:[
    {id:1,name:"Shoyu Ramen",price:1000,desc:"Regular + Karaage 3pc ¥400"},
    {id:2,name:"Miso Ramen",price:1000,desc:"Regular + Karaage 3pc ¥400"},
  ]},
];

let S={
  view:"home",tripId:null,tripData:null,trips:[],orders:[],imgs:{},
  adminUnlocked:false,leaderUnlocked:false,pass:"",passErr:"",
  adminTab:"trips",selectedTripId:null,
  orderForm:{name:"",pax:1,persons:[]},orderStep:1,curSesi:0,activePerson:0,
  submitted:false,orderErr:"",loading:true,
  newTrip:{nama:"",tarikh:"",tarikhMula:"",mod:"tren",pax:""},
  addSpecial:"",
  pickedFiles:[],pendingImgs:{},imgPreviews:[],selectingIdx:null,
};

function toast(m){const t=document.getElementById("toast");t.textContent=m||"✓";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function cp(txt){navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>toast("✓ Disalin!")):((a=>{a.value=txt;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);toast("✓ Disalin!");})(document.createElement("textarea")));}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function tlink(id){return location.origin+location.pathname+"?trip="+id;}
function f2b(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=j;fr.readAsDataURL(f);});}
function addD(ds,days){if(!ds)return"—";const d=new Date(ds);d.setDate(d.getDate()+days);return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function getW(trip,sid){const m=trip.mod||"tren";if(sid==="nara")return m==="tren"?"11:00am":"11:30am";if(sid==="namba")return m==="tren"?"5:00pm":"5:30pm";return"";}
function getTD(trip,sid){if(!trip.tarikhMula)return"—";if(sid==="nara"||sid==="namba")return addD(trip.tarikhMula,1);if(sid==="fuji")return addD(trip.tarikhMula,3);return"—";}

async function loadTrips(){try{const s=await getDocs(collection(db,"trips"));S.trips=s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){}}
async function loadOrders(tid){try{const s=await getDocs(collection(db,"trips",tid,"orders"));S.orders=s.docs.map(d=>d.data());}catch(e){S.orders=[];}}
async function loadImgs(){S.imgs={};try{const d=await getDoc(doc(db,"config","menuImgs"));if(d.exists())S.imgs={...d.data()};}catch(e){}}
async function saveImgs(){await setDoc(doc(db,"config","menuImgs"),S.imgs);}
function listenOrders(tid){onSnapshot(collection(db,"trips",tid,"orders"),s=>{S.orders=s.docs.map(d=>d.data());render();});}
async function saveOrder(tid,o){await setDoc(doc(db,"trips",tid,"orders",o.id),o);}
async function delOrder(tid,oid){await deleteDoc(doc(db,"trips",tid,"orders",oid));}
async function saveTrip(t){await setDoc(doc(db,"trips",t.id),t);}
async function delTrip(tid){const s=await getDocs(collection(db,"trips",tid,"orders"));for(const d of s.docs)await deleteDoc(d.ref);await deleteDoc(doc(db,"trips",tid));}

// Export builders
function bFuji(trip,orders){
  const sl=trip.sesi||SESI;const s=sl.find(x=>x.id==="fuji");if(!s)return"";
  const cnt={};const pm={};
  orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p["fuji"];if(i){cnt[i.name]=(cnt[i.name]||0)+1;pm[i.name]=i.price||0;}}));
  const CATS=[
    {label:"🥩 KATSURETU MENU",items:["Katsuretu Kawaguchiko Curry","Miso Katsuretu Shingen"]},
    {label:"🍚 RICE DISHES",items:["Yellow Chicken","Kawaguchiko Curry","Rice Curry","Kebab Rice"]},
    {label:"🌯 WRAP / KEBAB MENU",items:["Wrap Original (M)","Wrap Spicy (M)","Wrap Curry (M)","Wrap Teriyaki (M)","Wrap Wasabi (M)","Wrap Miso (M)"]},
    {label:"🍜 NOODLES",items:["Spicy Noodle 🌶","Spicy Noodle 🌶🌶","Spicy Noodle 🌶🌶🌶"]},
  ];
  let txt=`🍱 *BENTO ORDER — FUJI*\n📌 Trip: ${trip.nama}\n📅 Date: ${getTD(trip,"fuji")}\n${"─".repeat(28)}\n\n`;
  let grand=0;
  CATS.forEach(cat=>{
    const ci=cat.items.filter(n=>cnt[n]);if(!ci.length)return;
    txt+=`*${cat.label}*\n`;let sub=0;
    ci.forEach(n=>{const c=cnt[n];const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: *${c} pax* (¥${p.toLocaleString()} × ${c} = ¥${tot.toLocaleString()})\n`;});
    txt+=`  Subtotal: ¥${sub.toLocaleString()}\n\n`;grand+=sub;
  });
  txt+=`${"─".repeat(28)}\n💴 *GRAND TOTAL: ¥${grand.toLocaleString()}*\n`;
  return txt;
}
function bNara(trip,orders){
  const cnt={};const pm={};
  orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p["nara"];if(i){cnt[i.name]=(cnt[i.name]||0)+1;pm[i.name]=i.price||0;}}));
  const mod=trip.mod||"tren";
  let txt=`🍛 *LUNCH ORDER — NARA*\n📌 Trip: ${trip.nama}\n📅 Date: ${getTD(trip,"nara")}\n⏰ Order time: ${getW(trip,"nara")} (${mod==="tren"?"by train":"by bus"})\n${"─".repeat(28)}\n\n`;
  if(!Object.keys(cnt).length)return txt+"  No orders yet.\n";
  let sub=0;
  Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: *${c} pax* (¥${p.toLocaleString()} × ${c} = ¥${tot.toLocaleString()})\n`;});
  txt+=`\n💴 *Total: ¥${sub.toLocaleString()}*\n`;
  return txt;
}
function bNamba(trip,orders){
  const cnt={};
  orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p["namba"];if(i)cnt[i.name]=(cnt[i.name]||0)+1;}));
  const mod=trip.mod||"tren";
  let txt=`🍜 *DINNER ORDER — NAMBA/DOTONBORI*\n📌 Trip: ${trip.nama}\n📅 Date: ${getTD(trip,"namba")}\n⏰ Order time: ${getW(trip,"namba")} (${mod==="tren"?"by train":"by bus"})\n${"─".repeat(28)}\n\n`;
  if(!Object.keys(cnt).length)return txt+"  No orders yet.\n";
  const R=1000,K=400;const tp=Object.values(cnt).reduce((a,b)=>a+b,0);let rt=0;
  Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const tot=R*c;rt+=tot;txt+=`  • ${n} (Regular size)\n    ¥${R.toLocaleString()} × ${c} pax = ¥${tot.toLocaleString()}\n\n`;});
  const kt=K*tp;txt+=`  • Karaage 3pc\n    ¥${K.toLocaleString()} × ${tp} pax = ¥${kt.toLocaleString()}\n\n${"─".repeat(28)}\n🍜 Ramen total: ¥${rt.toLocaleString()}\n🍗 Karaage total: ¥${kt.toLocaleString()}\n💴 *GRAND TOTAL: ¥${(rt+kt).toLocaleString()}*\n`;
  return txt;
}
function bLeader(trip,orders){
  const sl=trip.sesi||SESI;
  let txt=`👥 *ORDER UNTUK TOUR LEADER*\n📌 Trip: ${trip.nama}\n📅 ${trip.tarikh||"—"}\n${"─".repeat(28)}\n\n`;
  orders.forEach((o,i)=>{
    txt+=`*${i+1}. ${o.name}*${(o.persons||[]).length>1?` (${o.persons.length} orang)`:""}\n`;
    const multi=(o.persons||[]).length>1;
    (o.persons||[]).forEach((p,pi)=>{
      if(multi)txt+=`  👤 Orang ${pi+1}:\n`;
      const ind=multi?"    ":"  ";
      sl.forEach(s=>{const item=p[s.id];txt+=`${ind}${s.nama}: ${item?item.name:"—"}`;if(item&&s.showPrice)txt+=` (¥${(item.price||0).toLocaleString()})`;if(s.id==="namba"&&item)txt+=` + Karaage 3pc (¥400)`;txt+="\n";});
    });
    let sf=0,sn=0;(o.persons||[]).forEach(p=>{const f=p["fuji"];const n=p["nara"];if(f)sf+=f.price||0;if(n)sn+=n.price||0;});
    txt+=`  💴 Fuji: ¥${sf.toLocaleString()} | Nara: ¥${sn.toLocaleString()} | *Jumlah: ¥${(sf+sn).toLocaleString()}*\n\n`;
  });
  let gf=0,gn=0;orders.forEach(o=>(o.persons||[]).forEach(p=>{const f=p["fuji"];const n=p["nara"];if(f)gf+=f.price||0;if(n)gn+=n.price||0;}));
  txt+=`${"─".repeat(28)}\n💴 *JUMLAH KESELURUHAN*\n  🍱 Fuji: ¥${gf.toLocaleString()}\n  🍛 Nara: ¥${gn.toLocaleString()}\n  *TOTAL: ¥${(gf+gn).toLocaleString()}*\n`;
  return txt;
}
function bRingkasan(trip,orders){
  const sl=trip.sesi||SESI;
  const tp=orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  let txt=`📊 *RINGKASAN KESELURUHAN*\n📌 Trip: ${trip.nama}\n📅 ${trip.tarikh||"—"}\n👥 ${orders.length} wakil | 🧑 ${tp} pax\n${"─".repeat(28)}\n\n`;
  sl.forEach(s=>{
    txt+=`*${s.nama}*\n`;const cnt={};const pm={};
    orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p[s.id];if(i){cnt[i.name]=(cnt[i.name]||0)+1;pm[i.name]=i.price||0;}}));
    let sub=0;Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{const p=pm[n]||0;const tot=p*c;sub+=tot;txt+=`  • ${n}: ${c} pax${s.showPrice?` = ¥${tot.toLocaleString()}`:""}\n`;});
    if(s.showPrice&&sub>0)txt+=`  💴 Jumlah: ¥${sub.toLocaleString()}\n`;txt+="\n";
  });
  return txt;
}

// Shared order list renderer
function renderOrderList(orders,sl,canDelete,deleteClass){
  if(!orders.length)return`<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">Tiada pesanan lagi.</div>`;
  return orders.map(o=>`<div class="oc">
    <div class="on"><span>${o.name}${(o.persons||[]).length>1?` <span style="font-size:11px;color:#888;font-weight:400">(${o.persons.length} orang)</span>`:""}</span>
    ${canDelete?`<button class="${deleteClass}" data-oid="${o.id}" style="font-size:11px;color:#e53935;background:none;border:none;cursor:pointer">Padam</button>`:""}</div>
    ${(o.persons||[]).map((p,pi)=>`
      ${(o.persons||[]).length>1?`<div style="font-size:11px;font-weight:600;color:#888;margin:5px 0 2px">👤 Orang ${pi+1}</div>`:""}
      ${sl.map(s=>`<div class="order-sesi"><div class="ost">${s.nama}</div>
      <div class="osv">${p[s.id]?p[s.id].name:"—"}${s.id==="namba"&&p[s.id]?' <span style="font-size:10px;color:#888">(Regular+Karaage)</span>':""}</div></div>`).join("")}`).join("")}
  </div>`).join("");
}

// Shared summary renderer
function renderSummary(orders,sl){
  return sl.map(s=>{
    const cnt={};orders.forEach(o=>(o.persons||[]).forEach(p=>{const i=p[s.id];if(i)cnt[i.name]=(cnt[i.name]||0)+1;}));
    const rows=!Object.keys(cnt).length?`<div style="padding:10px 14px;font-size:12px;color:#aaa">Tiada order</div>`:Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([n,c])=>`<div class="li"><span style="font-size:12px">${n}</span><span class="pb2">${c} pax</span></div>`).join("");
    return`<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:#1a6b3c;margin-bottom:4px">${s.nama}</div><div class="lc">${rows}</div></div>`;
  }).join("");
}

// Shared export buttons
function renderExportBtns(){
  return`<div class="es"><h4>📤 Eksport & Kongsi</h4>
    <div style="font-size:12px;color:#666;margin-bottom:6px;font-weight:600">Untuk Restoran:</div>
    <button class="bc" id="cp-fuji">🍱 Copy — Restoran Fuji</button>
    <button class="bc" id="cp-nara">🍛 Copy — Restoran Nara</button>
    <button class="bc" id="cp-namba">🍜 Copy — Restoran Namba</button>
    <div style="font-size:12px;color:#666;margin:10px 0 6px;font-weight:600">Lain-lain:</div>
    <button class="bc" id="cp-leader">👥 Copy — Untuk Tour Leader</button>
    <button class="bc" id="cp-ringkasan">📊 Copy — Ringkasan Keseluruhan</button>
  </div>`;
}

function render(){
  const el=document.getElementById("app");
  if(S.loading){el.innerHTML=`<div class="ld">🍱<br><br>Memuatkan...</div>`;return;}
  if(S.view==="notfound"){el.innerHTML=`<div class="ld">❌<br><br>Link trip tidak sah.</div>`;return;}
  try{
    if(S.view==="home")el.innerHTML=renderHome();
    else if(S.view==="order")el.innerHTML=renderOrder();
    else if(S.view==="admin")el.innerHTML=renderAdmin();
    else if(S.view==="leader")el.innerHTML=renderLeader();
  }catch(e){console.error(e);el.innerHTML=`<div class="ld">❌ Ralat: ${e.message}</div>`;}
  attachEvents();
}

function renderHome(){
  return`<div class="hdr"><div style="font-size:44px;margin-bottom:10px">🍱</div><h1>Sistem Order Makan</h1><p>Grup Tour Management</p></div>
  <div class="bod">
    <p style="font-size:14px;color:#666;margin-bottom:24px;text-align:center">Sila gunakan link trip yang diberikan oleh pengurus anda.</p>
    <button class="bs" id="go-admin">🔐 Log Masuk Admin</button>
    <button class="bs" id="go-leader">👤 Log Masuk Tour Leader</button>
  </div>`;
}

function renderLoginPage(title,icon,inputId,btnId){
  return`<div class="stk"><button class="bk" id="back">←</button><h2>${title}</h2></div>
  <div class="lw"><div style="text-align:center;font-size:40px;margin-bottom:24px">${icon}</div>
  <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600;text-align:center">Kata laluan ${title}</label>
  <input type="password" class="fi" id="${inputId}" placeholder="Kata laluan"/>
  ${S.passErr?`<div class="eb">${S.passErr}</div>`:""}
  <button class="bp" id="${btnId}">Log Masuk</button></div>`;
}

function renderOrder(){
  const trip=S.tripData;if(!trip)return`<div class="ld">❌</div>`;
  const sl=trip.sesi||SESI;
  const pax=trip.pax||22;
  const tpo=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  const rem=pax-tpo;

  if(S.submitted){
    const o=S.orderForm;
    return`<div class="stk"><h2>${trip.nama}</h2></div>
    <div class="sw"><div style="font-size:56px;margin-bottom:14px">✅</div><h2 style="font-size:22px;font-weight:600;margin-bottom:8px">Pesanan Diterima!</h2>
    <p style="font-size:15px;color:#666;margin-bottom:4px">Terima kasih, <b>${o.name}</b>.</p>
    <p style="font-size:13px;color:#aaa;margin-bottom:16px">${o.pax} orang telah dibuat pesanan.</p>
    <div class="sb"><h4>Ringkasan Pesanan</h4>
      ${sl.map(s=>`<div style="margin-bottom:10px"><div class="sst">${s.nama}</div>
        ${(o.persons||[]).map((p,i)=>`<div class="sr"><span>${o.pax>1?`Orang ${i+1}`:o.name}</span><span>${p[s.id]?p[s.id].name:"—"}</span></div>`).join("")}
      </div>`).join("")}
    </div></div>`;
  }

  if(S.orderStep===1){
    return`<div class="stk"><h2>${trip.nama}</h2><span style="font-size:11px;background:#f0f9f4;color:#1a6b3c;border-radius:20px;padding:3px 10px">${trip.tarikh||""}</span></div>
    <div class="bod">
      <div class="pb">${Array.from({length:sl.length+1}).map((_,i)=>`<div class="ps ${i===0?"active":""}"></div>`).join("")}</div>
      <p style="font-size:13px;color:#666;margin-bottom:16px">Slot tinggal: <b style="color:${rem<5?"#e53935":"#1a6b3c"}">${rem}</b> / ${pax}</p>
      <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600">Nama Anda (Wakil)</label>
      <input class="fi" id="oname" placeholder="cth: Ahmad bin Ali" value="${S.orderForm.name}"/>
      <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600">Bilangan orang (termasuk diri sendiri)</label>
      <div class="cr"><button class="cb" id="cminus">−</button><div class="cv">${S.orderForm.pax}</div><button class="cb" id="cplus">+</button></div>
      ${S.orderErr?`<div class="eb">${S.orderErr}</div>`:""}
    </div>
    <div class="fb"><button class="bp" id="nxt">Seterusnya →</button></div>`;
  }

  const sesi=sl[S.curSesi];const persons=S.orderForm.persons||[];const ap=S.activePerson;
  const allFilled=persons.every(p=>p[sesi.id]);const isLast=S.curSesi===sl.length-1;
  const tabs=persons.map((p,i)=>`<button class="ptb ${ap===i?"active":p[sesi.id]?"done":""}" data-ptab="${i}">${persons.length>1?`Orang ${i+1}`:"Anda"}</button>`).join("");
  const sel=persons[ap]?persons[ap][sesi.id]:null;
  const cards=sesi.menus.map(m=>{
    const isSel=sel&&sel.id===m.id;const imgSrc=S.imgs[`${sesi.id}_${m.id}`];
    return`<div class="mc ${isSel?"sel":""}" data-sid="${sesi.id}" data-pid="${ap}" data-mid="${m.id}">
      <div class="mw">${imgSrc?`<img src="${imgSrc}" alt="${m.name}"/>`:`<span style="font-size:26px">🍽️</span>`}${isSel?`<div class="mck">✓</div>`:""}</div>
      <div class="mi"><div class="mn">${m.name}${m.isVegan?`<span class="vt">Vegan</span>`:""}</div>
      ${sesi.showPrice?`<div class="mp">¥${m.price.toLocaleString()}</div>`:""}
      ${m.desc?`<div class="md">${m.desc}</div>`:""}</div>
    </div>`;
  }).join("");
  const prog=persons.map(p=>`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p[sesi.id]?"#1a6b3c":"#ddd"};margin:0 2px"></span>`).join("");

  return`<div class="stk"><h2>${trip.nama}</h2></div>
  <div class="bod">
    <div class="pb">${Array.from({length:sl.length+1}).map((_,i)=>`<div class="ps ${i<S.curSesi+1?"done":i===S.curSesi+1?"active":""}"></div>`).join("")}</div>
    <div class="sh"><h3>${sesi.nama}</h3>${sesi.note?`<p>${sesi.note}</p>`:""}</div>
    ${sesi.id==="namba"?`<div class="sn">✅ Semua order termasuk Regular size + Karaage 3pc (¥400)</div>`:""}
    <div class="ib">📋 <b>Arahan:</b> Pilih menu untuk setiap orang menggunakan tab di bawah.
      <div style="margin-top:6px">${prog} <span style="font-size:11px;color:#1a6b3c">${persons.filter(p=>p[sesi.id]).length}/${persons.length} selesai</span></div>
    </div>
    <div class="pt">${tabs}</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">
      ${persons.length>1?`👤 ${ap===0?"Anda (Orang 1)":`Orang ${ap+1}`}:`:"Pilihan Anda:"}
      ${persons[ap]&&persons[ap][sesi.id]?`<span style="color:#1a6b3c;font-size:12px;font-weight:600"> ✓ ${persons[ap][sesi.id].name}</span>`:`<span style="color:#aaa;font-size:12px;font-weight:400"> Belum dipilih</span>`}
    </div>
    <div class="mg">${cards}</div>
    ${S.orderErr?`<div class="eb">${S.orderErr}</div>`:""}
  </div>
  <div class="fb"><div style="display:flex;gap:8px">
    <button class="bs" id="prv" style="margin:0;flex:1;padding:14px 0">← Balik</button>
    <button class="bp" id="nxt" style="margin:0;flex:2">${isLast?"✅ Hantar Pesanan":"Seterusnya →"}</button>
  </div></div>`;
}

function renderAdmin(){
  if(!S.adminUnlocked)return renderLoginPage("Admin","🔐","apass","alogin");

  if(S.adminTab==="trips"){
    const cards=S.trips.map(t=>`<div class="tc">
      <div class="tn">${t.nama}</div>
      <div class="tm">📅 ${t.tarikh||"—"} &nbsp;👥 ${t.pax||22} pax &nbsp;🚌 ${t.mod||"tren"}</div>
      <span class="tl">${tlink(t.id)}</span>
      <div class="ta">
        <button class="bsm" data-copy="${tlink(t.id)}">📋 Copy Link</button>
        <button class="bsm g" data-vtrip="${t.id}">📊 Order</button>
        <button class="bsm r" data-dtrip="${t.id}">🗑 Padam</button>
      </div></div>`).join("")||`<p style="color:#aaa;font-size:13px;text-align:center;padding:20px">Tiada trip lagi.</p>`;
    return`<div class="stk"><button class="bk" id="back">←</button><h2>Admin Panel</h2></div>
    <div class="bod" style="padding-bottom:40px">
      <div class="tr"><button class="tb active" data-tab="trips">🗺️ Trip</button><button class="tb" data-tab="orders">📋 Order</button><button class="tb" data-tab="imgs">🖼️ Menu</button></div>
      <div class="sct">Senarai Trip</div>${cards}
      <div class="sct">Tambah Trip Baru</div>
      <div class="ab">
        <input class="fi" id="tnam" placeholder="Nama trip (cth: Japan Nov 2025)" value="${S.newTrip.nama}"/>
        <input class="fi" id="ttar" placeholder="Tarikh trip (cth: 1-7 Nov 2025)" value="${S.newTrip.tarikh}"/>
        <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600">Tarikh mula di Osaka (Hari ke-1)</label>
        <input class="fi" id="tmula" type="date" value="${S.newTrip.tarikhMula||""}"/>
        <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:600">Mod pengangkutan</label>
        <select class="fi" id="tmod"><option value="tren" ${(S.newTrip.mod||"tren")==="tren"?"selected":""}>🚃 Tren (Nara: 11:00am | Namba: 5:00pm)</option><option value="bas" ${S.newTrip.mod==="bas"?"selected":""}>🚌 Bas (Nara: 11:30am | Namba: 5:30pm)</option></select>
        <input class="fi" id="tpax" placeholder="Jumlah peserta (cth: 22)" value="${S.newTrip.pax}" type="number"/>
        <button class="bp" id="addtrip" style="margin-bottom:0">+ Cipta Trip Baru</button>
      </div></div>`;
  }

  if(S.adminTab==="imgs"){
    const pending=S.pendingImgs||{};const previews=S.imgPreviews||[];
    const assignedIdx={};Object.entries(pending).forEach(([k,v])=>assignedIdx[v.fileIdx]=k);
    const allMenus=[];SESI.forEach(s=>s.menus.forEach(m=>allMenus.push({key:`${s.id}_${m.id}`,name:m.name,sesiNama:s.nama})));
    const total=allMenus.length;const has=allMenus.filter(m=>S.imgs[m.key]||pending[m.key]).length;
    const statusGrid=SESI.map(s=>`
      <div style="font-size:12px;font-weight:600;color:#1a6b3c;margin:14px 0 8px;text-transform:uppercase">${s.nama}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">
        ${s.menus.map(m=>{
          const k=`${s.id}_${m.id}`;const src=pending[k]?pending[k].preview:S.imgs[k];const ip=!!pending[k];const he=!!S.imgs[k];
          return`<div style="border-radius:10px;overflow:hidden;border:2px solid ${ip?"#e65100":he?"#1a6b3c":"#eee"};background:#fff;position:relative">
            <div style="width:100%;height:70px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden">
              ${src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover"/>`:`<span style="font-size:24px">🍽️</span>`}
            </div>
            <div style="padding:5px 7px"><div style="font-size:10px;font-weight:600;color:#1a1a1a;line-height:1.3">${m.name}</div>
            <div style="font-size:9px;margin-top:2px;color:${ip?"#e65100":he?"#1a6b3c":"#bbb"}">${ip?"⏳ Belum simpan":he?"✓ Ada gambar":"Tiada gambar"}</div></div>
            ${ip?`<div style="position:absolute;top:4px;right:4px;background:#e65100;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">!</div>`:he?`<div style="position:absolute;top:4px;right:4px;background:#1a6b3c;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">✓</div>`:""}
          </div>`;
        }).join("")}</div>`).join("");
    const grid=previews.length>0?`
      <div style="font-size:13px;font-weight:600;margin:16px 0 6px">🖼️ Langkah 2 — Klik gambar untuk padankan</div>
      <p style="font-size:12px;color:#888;margin-bottom:10px">Klik gambar → pilih menu yang sepadan.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        ${previews.map((prev,i)=>{const ak=assignedIdx[i];const am=ak?allMenus.find(m=>m.key===ak):null;
          return`<div class="igitem" data-fi="${i}" style="position:relative;border-radius:10px;overflow:hidden;border:2.5px solid ${am?"#1a6b3c":"#eee"};cursor:pointer;background:#f5f5f5">
            <img src="${prev}" style="width:100%;height:80px;object-fit:cover;display:block"/>
            <div style="padding:4px 5px;font-size:9px;line-height:1.3;min-height:28px;color:${am?"#1a6b3c":"#888"}">${am?`✓ ${am.name}`:"Klik padankan"}</div>
            ${am?`<div style="position:absolute;top:3px;right:3px;background:#1a6b3c;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">✓</div>`:""}
          </div>`;}).join("")}
      </div>`:"";
    const modal=S.selectingIdx!==null&&S.selectingIdx!==undefined?`
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center" id="moverlay">
      <div style="background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:16px;max-height:75vh;overflow-y:auto">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:15px;font-weight:600">Pilih menu untuk gambar ini</div>
          <button id="mclose" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888">✕</button>
        </div>
        <img src="${previews[S.selectingIdx]}" style="width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:12px"/>
        ${SESI.map(s=>`
          <div style="font-size:10px;font-weight:600;color:#1a6b3c;margin:8px 0 4px;text-transform:uppercase">${s.nama}</div>
          ${s.menus.map(m=>{const k=`${s.id}_${m.id}`;const isA=pending[k]&&pending[k].fileIdx===S.selectingIdx;const imgSrc=S.imgs[k];
            return`<div class="mitem" data-key="${k}" data-fi="${S.selectingIdx}"
              style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;background:${isA?"#f0f9f4":"#f9f9f9"};border:1.5px solid ${isA?"#1a6b3c":"transparent"}">
              <div style="width:32px;height:32px;border-radius:6px;overflow:hidden;background:#eee;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px">
                ${imgSrc?`<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover"/>`:"🍽️"}
              </div>
              <span style="font-size:13px;flex:1">${m.name}</span>
              ${isA?`<span style="color:#1a6b3c;font-size:13px;font-weight:600">✓</span>`:""}
            </div>`;}).join("")}`).join("")}
        <button id="mremove" style="width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #e53935;background:#fff;color:#e53935;font-size:13px;cursor:pointer">✕ Buang Padanan</button>
      </div>
    </div>`:"";
    return`<div class="stk"><button class="bk" id="back">←</button><h2>Urus Menu & Gambar</h2></div>
    <div class="bod" style="padding-bottom:100px">
      <div class="tr"><button class="tb" data-tab="trips">🗺️ Trip</button><button class="tb" data-tab="orders">📋 Order</button><button class="tb active" data-tab="imgs">🖼️ Menu</button></div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <div style="flex:1;background:#f0f9f4;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:600;color:#1a6b3c">${has}</div><div style="font-size:11px;color:#666">Ada gambar</div></div>
        <div style="flex:1;background:#f9f9f9;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:600;color:#888">${total-has}</div><div style="font-size:11px;color:#666">Tiada gambar</div></div>
        <div style="flex:1;background:#fff8e1;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:600;color:#e65100">${Object.keys(pending).length}</div><div style="font-size:11px;color:#666">Belum simpan</div></div>
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">📋 Status Semua Menu</div>${statusGrid}
      <div style="margin-top:16px" class="ab">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">📂 Langkah 1 — Upload gambar baru</div>
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:1.5px dashed #1a6b3c;border-radius:10px;cursor:pointer;font-size:13px;color:#1a6b3c;background:#f0f9f4">
          📷 ${previews.length>0?`${previews.length} gambar dipilih — klik untuk tukar`:"Pilih gambar (boleh pilih banyak)"}
          <input type="file" accept="image/*" multiple style="display:none" id="bulkpick"/>
        </label>
      </div>${grid}
    </div>
    <div class="fb"><button class="bp" id="saveimgs" ${!Object.keys(pending).length?"disabled":""}>💾 Simpan ${Object.keys(pending).length>0?Object.keys(pending).length+" gambar":"Gambar"}</button></div>
    ${modal}`;
  }

  // Orders tab
  const trip=S.trips.find(t=>t.id===S.selectedTripId)||S.trips[0];
  const sl=trip?(trip.sesi||SESI):SESI;
  const orders=S.orders;
  const totalPax=orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  const tripSel=S.trips.length>0?`<select class="fi" id="tsel">${S.trips.map(t=>`<option value="${t.id}" ${S.selectedTripId===t.id?"selected":""}>${t.nama}</option>`).join("")}</select>`:`<p style="color:#aaa;font-size:13px">Tiada trip.</p>`;
  return`<div class="stk"><button class="bk" id="back">←</button><h2>Admin Panel</h2></div>
  <div class="bod" style="padding-bottom:40px">
    <div class="tr"><button class="tb" data-tab="trips">🗺️ Trip</button><button class="tb active" data-tab="orders">📋 Order</button><button class="tb" data-tab="imgs">🖼️ Menu</button></div>
    ${tripSel}
    <div class="str">
      <div class="sc"><div class="sl">Wakil</div><div class="sv">${orders.length}</div></div>
      <div class="sc"><div class="sl">Jumlah Pax</div><div class="sv">${totalPax}/${trip?trip.pax:22}</div></div>
      <div class="sc"><div class="sl">Tinggal</div><div class="sv">${trip?(trip.pax||22)-totalPax:0}</div></div>
    </div>
    ${renderExportBtns()}
    <div class="sct">Ringkasan Mengikut Sesi</div>${renderSummary(orders,sl)}
    <div class="ab"><div style="font-size:13px;font-weight:600;margin-bottom:8px">➕ Tambah Menu Khas (Namba)</div>
      <input class="fi" id="spnama" placeholder="cth: Vegan Ramen / Special Request" value="${S.addSpecial}"/>
      <button class="bp" id="addspecial" style="margin-bottom:0">Tambah Menu</button>
    </div>
    <div class="sct">Senarai Pesanan</div>
    ${renderOrderList(orders,sl,true,"adel")}
    <button class="bd" id="resettrip">🗑 Reset Semua Pesanan Trip Ini</button>
  </div>`;
}

function renderLeader(){
  if(!S.leaderUnlocked)return renderLoginPage("Tour Leader","👤","lpass","llogin");
  const trip=S.trips.find(t=>t.id===S.selectedTripId)||S.trips[0];
  const sl=trip?(trip.sesi||SESI):SESI;
  const orders=S.orders;
  const totalPax=orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
  const tripSel=S.trips.length>0?`<select class="fi" id="tsel">${S.trips.map(t=>`<option value="${t.id}" ${S.selectedTripId===t.id?"selected":""}>${t.nama}</option>`).join("")}</select>`:`<p style="color:#aaa;font-size:13px">Tiada trip.</p>`;
  return`<div class="stk"><button class="bk" id="back">←</button><h2>👤 Tour Leader</h2></div>
  <div class="bod" style="padding-bottom:40px">
    ${tripSel}
    <div class="str">
      <div class="sc"><div class="sl">Wakil</div><div class="sv">${orders.length}</div></div>
      <div class="sc"><div class="sl">Jumlah Pax</div><div class="sv">${totalPax}/${trip?trip.pax:22}</div></div>
      <div class="sc"><div class="sl">Tinggal</div><div class="sv">${trip?(trip.pax||22)-totalPax:0}</div></div>
    </div>
    ${renderExportBtns()}
    <div class="sct">Ringkasan Mengikut Sesi</div>${renderSummary(orders,sl)}
    <div class="sct">Senarai Pesanan</div>
    <div class="amr">⚠️ <b>Amaran:</b> Padam pesanan hanya apabila peserta membuat permintaan rasmi. Tindakan ini tidak boleh dibatalkan.</div>
    ${renderOrderList(orders,sl,true,"ldel")}
  </div>`;
}

function attachEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  on("go-admin","click",()=>{S.view="admin";S.pass="";S.passErr="";render();});
  on("go-leader","click",()=>{S.view="leader";S.pass="";S.passErr="";loadTrips().then(async()=>{if(S.trips.length>0){S.selectedTripId=S.trips[0].id;await loadOrders(S.selectedTripId);}render();});});
  on("back","click",()=>{
    if(S.view==="admin"){S.adminUnlocked=false;}
    if(S.view==="leader"){S.leaderUnlocked=false;}
    S.view="home";render();
  });

  // Admin login
  on("apass","input",e=>S.pass=e.target.value);
  on("alogin","click",()=>{
    if(S.pass===PASS){S.adminUnlocked=true;S.passErr="";loadTrips().then(async()=>{if(S.trips.length>0){S.selectedTripId=S.trips[0].id;await loadOrders(S.selectedTripId);}render();});}
    else{S.passErr="Kata laluan salah.";render();}
  });
  on("apass","keydown",e=>{if(e.key==="Enter")$("alogin")?.click();});

  // Leader login
  on("lpass","input",e=>S.pass=e.target.value);
  on("llogin","click",()=>{
    if(S.pass===LPASS){S.leaderUnlocked=true;S.passErr="";loadTrips().then(async()=>{if(S.trips.length>0){S.selectedTripId=S.trips[0].id;await loadOrders(S.selectedTripId);}render();});}
    else{S.passErr="Kata laluan salah.";render();}
  });
  on("lpass","keydown",e=>{if(e.key==="Enter")$("llogin")?.click();});

  // Tabs
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{
    S.adminTab=b.dataset.tab;
    if(S.adminTab==="orders"&&S.trips.length>0){S.selectedTripId=S.selectedTripId||S.trips[0].id;loadOrders(S.selectedTripId).then(render);}
    else if(S.adminTab==="imgs"){S.pickedFiles=[];S.pendingImgs={};S.imgPreviews=[];S.selectingIdx=null;render();}
    else render();
  }));

  // Trip selector
  on("tsel","change",async e=>{S.selectedTripId=e.target.value;await loadOrders(S.selectedTripId);render();});

  // Trip management
  on("tnam","input",e=>S.newTrip.nama=e.target.value);
  on("ttar","input",e=>S.newTrip.tarikh=e.target.value);
  on("tmula","input",e=>S.newTrip.tarikhMula=e.target.value);
  on("tmod","change",e=>S.newTrip.mod=e.target.value);
  on("tpax","input",e=>S.newTrip.pax=e.target.value);
  on("addtrip","click",async()=>{
    if(!S.newTrip.nama.trim()){alert("Sila masukkan nama trip.");return;}
    if(!S.newTrip.tarikhMula){alert("Sila masukkan tarikh mula di Osaka.");return;}
    const id=gid();const t={id,nama:S.newTrip.nama,tarikh:S.newTrip.tarikh,tarikhMula:S.newTrip.tarikhMula,mod:S.newTrip.mod||"tren",pax:parseInt(S.newTrip.pax)||22,sesi:SESI};
    await saveTrip(t);S.trips.push(t);S.newTrip={nama:"",tarikh:"",tarikhMula:"",mod:"tren",pax:""};
    alert(`✅ Trip "${t.nama}" berjaya dicipta!\n\n🔗 Link:\n${tlink(id)}`);render();
  });
  document.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",()=>{navigator.clipboard.writeText(b.dataset.copy).then(()=>toast("✓ Link disalin!"));}));
  document.querySelectorAll("[data-vtrip]").forEach(b=>b.addEventListener("click",async()=>{S.selectedTripId=b.dataset.vtrip;S.adminTab="orders";await loadOrders(S.selectedTripId);render();}));
  document.querySelectorAll("[data-dtrip]").forEach(b=>b.addEventListener("click",async()=>{
    if(!confirm("Padam trip ini?"))return;await delTrip(b.dataset.dtrip);S.trips=S.trips.filter(t=>t.id!==b.dataset.dtrip);render();
  }));

  // Export
  on("cp-fuji","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)cp(bFuji(t,S.orders));});
  on("cp-nara","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)cp(bNara(t,S.orders));});
  on("cp-namba","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)cp(bNamba(t,S.orders));});
  on("cp-leader","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)cp(bLeader(t,S.orders));});
  on("cp-ringkasan","click",()=>{const t=S.trips.find(t=>t.id===S.selectedTripId);if(t)cp(bRingkasan(t,S.orders));});

  // Admin delete order
  document.querySelectorAll(".adel").forEach(b=>b.addEventListener("click",async()=>{
    if(!confirm("Padam pesanan ini?"))return;
    const tid=S.selectedTripId||S.tripId;await delOrder(tid,b.dataset.oid);S.orders=S.orders.filter(o=>o.id!==b.dataset.oid);render();
  }));

  // Leader delete order (double confirm)
  document.querySelectorAll(".ldel").forEach(b=>b.addEventListener("click",async()=>{
    if(!confirm("⚠️ AMARAN\n\nAdakah anda pasti hendak memadam pesanan ini?\n\nTindakan ini TIDAK BOLEH dibatalkan.\nSila pastikan peserta telah membuat permintaan rasmi."))return;
    if(!confirm("Pengesahan kedua: Padam pesanan ini sekarang?"))return;
    const tid=S.selectedTripId||S.tripId;await delOrder(tid,b.dataset.oid);S.orders=S.orders.filter(o=>o.id!==b.dataset.oid);toast("✓ Pesanan dipadam.");render();
  }));

  // Reset trip
  on("resettrip","click",async()=>{
    if(!confirm("Padam SEMUA pesanan?"))return;
    const tid=S.selectedTripId;const snap=await getDocs(collection(db,"trips",tid,"orders"));
    for(const d of snap.docs)await deleteDoc(d.ref);S.orders=[];render();
  });

  // Special menu
  on("spnama","input",e=>S.addSpecial=e.target.value);
  on("addspecial","click",async()=>{
    const nama=S.addSpecial.trim();if(!nama)return;
    const tid=S.selectedTripId;const trip=S.trips.find(t=>t.id===tid);if(!trip)return;
    const sesi=trip.sesi||SESI;const namba=sesi.find(s=>s.id==="namba");if(!namba)return;
    namba.menus.push({id:Date.now(),name:nama,price:1000,desc:"Special/Vegan",isSpecial:true});
    await setDoc(doc(db,"trips",tid),trip);S.addSpecial="";toast(`✓ "${nama}" ditambah!`);render();
  });

  // Image management
  on("bulkpick","change",async e=>{
    S.pickedFiles=Array.from(e.target.files);S.pendingImgs={};S.selectingIdx=null;
    S.imgPreviews=await Promise.all(S.pickedFiles.map(f=>f2b(f)));render();
  });
  document.querySelectorAll(".igitem").forEach(item=>item.addEventListener("click",()=>{S.selectingIdx=parseInt(item.dataset.fi);render();}));
  on("mclose","click",()=>{S.selectingIdx=null;render();});
  on("moverlay","click",e=>{if(e.target.id==="moverlay"){S.selectingIdx=null;render();}});
  document.querySelectorAll(".mitem").forEach(item=>item.addEventListener("click",async()=>{
    const k=item.dataset.key;const fi=parseInt(item.dataset.fi);
    Object.keys(S.pendingImgs).forEach(x=>{if(S.pendingImgs[x].fileIdx===fi||x===k)delete S.pendingImgs[x];});
    S.pendingImgs[k]={fileIdx:fi,preview:S.imgPreviews[fi],file:S.pickedFiles[fi],filename:S.pickedFiles[fi].name};
    S.selectingIdx=null;render();
  }));
  on("mremove","click",()=>{
    const fi=S.selectingIdx;Object.keys(S.pendingImgs).forEach(k=>{if(S.pendingImgs[k].fileIdx===fi)delete S.pendingImgs[k];});S.selectingIdx=null;render();
  });
  on("saveimgs","click",async()=>{
    const keys=Object.keys(S.pendingImgs);if(!keys.length)return;
    toast("⏳ Menyimpan...");
    for(const k of keys){const b64=await f2b(S.pendingImgs[k].file);S.imgs[k]=b64;}
    await saveImgs();S.pendingImgs={};S.pickedFiles=[];S.imgPreviews=[];
    toast(`✓ ${keys.length} gambar berjaya disimpan!`);render();
  });

  // Order flow
  on("oname","input",e=>S.orderForm.name=e.target.value);
  on("cminus","click",()=>{S.orderForm.pax=Math.max(1,S.orderForm.pax-1);render();});
  on("cplus","click",()=>{
    const trip=S.tripData;const pax=trip?trip.pax:22;
    const tp=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
    S.orderForm.pax=Math.min(S.orderForm.pax+1,pax-tp);render();
  });
  document.querySelectorAll("[data-ptab]").forEach(b=>b.addEventListener("click",()=>{S.activePerson=parseInt(b.dataset.ptab);render();}));
  on("nxt","click",async()=>{
    const trip=S.tripData;const sl=trip.sesi||SESI;
    const pax=trip?trip.pax:22;const tp=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);const rem=pax-tp;
    if(S.orderStep===1){
      const name=($("oname")||{}).value?.trim()||S.orderForm.name.trim();
      S.orderForm.name=name;
      if(!name){S.orderErr="Sila masukkan nama anda.";render();return;}
      if(S.orders.find(o=>o.name.toLowerCase()===name.toLowerCase())){S.orderErr="Nama ini sudah membuat pesanan.";render();return;}
      if(rem<=0){S.orderErr="Maaf, slot pesanan sudah penuh.";render();return;}
      if(S.orderForm.pax>rem){S.orderErr=`Hanya ${rem} slot tinggal.`;render();return;}
      S.orderForm.persons=Array.from({length:S.orderForm.pax},()=>({}));
      S.curSesi=0;S.activePerson=0;S.orderErr="";S.orderStep=2;render();
    } else {
      const sesi=sl[S.curSesi];const allFilled=S.orderForm.persons.every(p=>p[sesi.id]);
      if(!allFilled){const m=S.orderForm.persons.findIndex(p=>!p[sesi.id]);S.activePerson=m;S.orderErr=`Sila pilih menu untuk semua ${S.orderForm.pax} orang.`;render();return;}
      S.orderErr="";
      if(S.curSesi===sl.length-1){await saveOrder(S.tripId,{id:gid(),name:S.orderForm.name,persons:S.orderForm.persons});S.submitted=true;render();}
      else{S.curSesi++;S.activePerson=0;render();}
    }
  });
  on("prv","click",()=>{if(S.curSesi>0){S.curSesi--;S.activePerson=0;S.orderErr="";}else{S.orderStep=1;S.orderErr="";}render();});
  document.querySelectorAll(".mc").forEach(c=>c.addEventListener("click",()=>{
    const sid=c.dataset.sid;const pid=parseInt(c.dataset.pid);const mid=parseInt(c.dataset.mid);
    const sl=S.tripData.sesi||SESI;const sesi=sl.find(s=>s.id===sid);if(!sesi)return;
    const menu=sesi.menus.find(m=>m.id===mid);if(!menu)return;
    if(!S.orderForm.persons[pid])S.orderForm.persons[pid]={};
    S.orderForm.persons[pid][sid]=menu;S.orderErr="";
    const next=S.orderForm.persons.findIndex((p,i)=>i>pid&&!p[sid]);
    if(next!==-1)S.activePerson=next;render();
  }));
}

window.addEventListener("DOMContentLoaded",async()=>{
  try{
    const params=new URLSearchParams(location.search);const tid=params.get("trip");
    if(tid){
      const d=await getDoc(doc(db,"trips",tid));
      if(d.exists()){S.tripId=tid;S.tripData={id:tid,...d.data()};await loadOrders(tid);await loadImgs();listenOrders(tid);S.view="order";}
      else S.view="notfound";
    } else {
      await loadTrips();await loadImgs();
      if(S.trips.length>0)S.selectedTripId=S.trips[0].id;
    }
  }catch(e){console.error(e);}
  S.loading=false;render();
});
</script>
</body>
</html>
