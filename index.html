// ── Helpers ──────────────────────────────────────────
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

function f2b(file){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.onerror=rej;
r.readAsDataURL(file);
});
}
function compressImg(file,maxKB=300){
return new Promise(resolve=>{
const img=new Image();
const url=URL.createObjectURL(file);
img.onload=()=>{
URL.revokeObjectURL(url);
let w=img.width,h=img.height;
const MAX=700;
if(w>MAX||h>MAX){const ratio=Math.min(MAX/w,MAX/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}
const canvas=document.createElement("canvas");
canvas.width=w;canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
let q=0.75;
function tryQ(){
const b64=canvas.toDataURL("image/jpeg",q);
const kb=(b64.length*3/4)/1024;
if(kb<=maxKB||q<=0.15){resolve(b64);}
else{q=Math.max(0.15,q-0.1);tryQ();}
}
tryQ();
};
img.onerror=()=>f2b(file).then(resolve);
img.src=url;
});
}

// ── PDF Parser (pdf.js — lazy loaded) ──────────────────────────────────────────
let _pdfjsLib=null;
async function loadPdfLib(){
if(_pdfjsLib)return _pdfjsLib;
try{
const lib=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs");
lib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs";
_pdfjsLib=lib;
return lib;
}catch(e){
console.error("pdf.js load failed:",e);
throw new Error("Tidak dapat muat library PDF. Sila semak sambungan internet, refresh halaman, dan cuba lagi.");
}
}
async function pdfToLines(file){
const pdfjsLib=await loadPdfLib();
const data=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data}).promise;
const allLines=[];
for(let i=1;i<=pdf.numPages;i++){
const page=await pdf.getPage(i);
const content=await page.getTextContent();
const items=content.items.map(it=>({x:it.transform[4],y:it.transform[5],str:it.str}));
items.sort((a,b)=>b.y-a.y||a.x-b.x);
let curY=null,curLine=[];
const lines=[];
for(const it of items){
if(!it.str.trim())continue;
if(curY===null){curY=it.y;curLine=[it];}
else if(Math.abs(it.y-curY)<3){curLine.push(it);}
else{lines.push(curLine.map(c=>c.str).join(' ').replace(/\s+/g,' ').trim());curLine=[it];curY=it.y;}
}
if(curLine.length)lines.push(curLine.map(c=>c.str).join(' ').replace(/\s+/g,' ').trim());
allLines.push(...lines.filter(l=>l));
}
return allLines;
}
const MONTH_MAP={jan:'01',feb:'02',mac:'03',mar:'03',apr:'04',may:'05',mei:'05',jun:'06',jul:'07',jul:'07',aug:'08',ogo:'08',sep:'09',oct:'10',okt:'10',nov:'11',dec:'12',dis:'12'};
function parseItinerary(lines){
const text=lines.join('\n');
const out={tarikhMula:null,bookingRef:null,mod:'tren',pax:null,groupName:null,dayModes:{}};
// Day 1 date — format: "Day 1 25-May-26 (Mon)"
const m=text.match(/Day\s*1\s+(\d{1,2})[-/](\w+)[-/](\d{2,4})/i);
if(m){
const day=m[1].padStart(2,'0');
const monKey=m[2].toLowerCase().substr(0,3);
const month=MONTH_MAP[monKey];
let year=m[3];if(year.length===2)year='20'+year;
if(month)out.tarikhMula=`${year}-${month}-${day}`;
}
// Booking Ref
const r=text.match(/Booking\s*Ref\.?\s*:?\s*([A-Z0-9][^\n]*?)(?:\n|$)/i);
if(r)out.bookingRef=r[1].trim().replace(/\s+\d+\s*days?$/i,'').trim();
// Group name
const g=text.match(/Group\s*(\d+)/i);
if(g)out.groupName=`Group ${g[1]}`;
// Pax (rujukan sahaja — kita guna senarai peserta sebagai pax sebenar)
const p=text.match(/(\d{1,3})\s+PAX/i);
if(p)out.pax=parseInt(p[1]);
// Day-by-day mode detection
const dayRe=/Day\s*(\d+)\s+\d{1,2}[-/]\w+[-/]\d{2,4}/gi;
const dMatches=[...text.matchAll(dayRe)];
// Cari end marker — guna pattern unik kepada penghujung dokumen (bukan header)
const endM=text.match(/TOUR\s*REMARKS|Bank\s*Details|Acceptance\s+\d/i);
const endPos=endM?text.indexOf(endM[0],dMatches[0]?dMatches[0].index:0):text.length;
const positions=dMatches.map(x=>x.index).concat([endPos]);
for(let i=0;i<dMatches.length;i++){
const day=parseInt(dMatches[i][1]);
const section=text.substring(positions[i],positions[i+1]);
let dm='tren';
if(/no\s*bus\s*service/i.test(section))dm='tren';
else if(/big\s*bus/i.test(section))dm='bas';
else if(/by\s*train|bullet\s*train/i.test(section))dm='tren';
out.dayModes[day]=dm;
}
// Set mod sistem berdasarkan Day 2 (hari Nara/Namba) — kerana itu yang penting untuk booking
if(out.dayModes[2])out.mod=out.dayModes[2];
else if(/big\s*bus/i.test(text))out.mod='bas';
return out;
}
function parseRoomingList(lines){
const out={peserta:[],tarikhTrip:null};
for(const line of lines){
const t=line.match(/TARIKH\s*TRIP\s*:?\s*(.+)/i);
if(t)out.tarikhTrip=t[1].trim();
// Cari passport: letter + 7-9 digit (handle 'X6851600' which has 7 digits)
const pm=line.match(/\b([A-Z])(\d{7,9})\b/);
if(!pm)continue;
let before=line.substring(0,pm.index).trim();
// Strip leading number (1-3 digit)
before=before.replace(/^\d{1,3}\s+/,'');
// Strip phone number at end (e.g., '019-2933445', '60-12-3456789')
before=before.replace(/\s+\d{2,4}-\d{2,4}-?\d{0,7}\s*$/,'');
// Detect TL: (TL) atau (TOUR LEADER) atau plain 'TOUR LEADER'
const isTL=/\(\s*TL\s*\)|\(\s*TOUR\s*LEADER\s*\)|tour\s*leader/i.test(before);
let nama=before.replace(/\(\s*TL\s*\)|\(\s*TOUR\s*LEADER\s*\)/gi,'').replace(/\s+/g,' ').trim();
// Validate looks like name
if(nama.length<4)continue;
if(!/^[A-Z]/.test(nama))continue;
if(!/[A-Z]\s+[A-Z]/.test(nama))continue;
// Skip flight/hotel/airline noise that may have caps + passport-like
if(/AIRASIA|AIRPORT|HOTEL|FLIGHT|KUL|KIX|HND|\bD7\s/i.test(nama))continue;
out.peserta.push({nama,isTL});
}
return out;
}
function fuzzyMatchPeserta(input,peserta){
if(!input||!peserta||!peserta.length)return null;
const norm=s=>(s||'').toLowerCase().replace(/[.,]/g,' ').replace(/\s+/g,' ').trim();
const inp=norm(input);
if(!inp)return null;
const exact=peserta.find(p=>norm(p.nama)===inp);
if(exact)return{match:exact,confidence:'exact'};
const inpWords=inp.split(' ').filter(w=>w.length>2&&!['bin','binti','bte','bt','b'].includes(w));
if(!inpWords.length)return null;
const partial=peserta.find(p=>{const np=norm(p.nama);return inpWords.every(w=>np.includes(w));});
if(partial)return{match:partial,confidence:'partial'};
return null;
}
function findOrderByName(input,orders){
if(!input||!orders||!orders.length)return null;
const norm=s=>(s||'').toLowerCase().replace(/[.,]/g,' ').replace(/\s+/g,' ').trim();
const inp=norm(input);
if(!inp)return null;
const exact=orders.find(o=>norm(o.name)===inp);
if(exact)return exact;
const inpWords=inp.split(' ').filter(w=>w.length>2&&!['bin','binti','bte','bt','b'].includes(w));
if(!inpWords.length)return null;
return orders.find(o=>{const np=norm(o.name);return inpWords.every(w=>np.includes(w));});
}
function suggestTripNama(itin,room){
const dt=room.tarikhTrip||'';
const grp=itin.groupName||'';
// Ekstrak kod EE sahaja (cth: "EE22169" dari "EE22169 2026 Group9")
let code='';
if(itin.bookingRef){
const m=itin.bookingRef.match(/\b(EE\d+)\b/i);
if(m)code=m[1].toUpperCase();
}
const parts=[];
if(grp)parts.push(grp);
if(code)parts.push(code);
const prefix=parts.length?parts.join(' • '):'';
if(prefix&&dt)return`${prefix} — ${dt}`;
if(prefix)return prefix;
if(dt)return dt;
if(itin.bookingRef)return itin.bookingRef;
return'';
}

function rTracking(trip,orders){
if(!trip||!trip.peserta||!trip.peserta.length)return'';
const orderedNames=new Set();
orders.forEach(o=>{
const m=fuzzyMatchPeserta(o.name,trip.peserta);
if(m)orderedNames.add(m.match.nama);
});
const tot=trip.peserta.length;
const ok=orderedNames.size;
const pct=tot>0?Math.round(ok/tot*100):0;
const pending=trip.peserta.filter(p=>!orderedNames.has(p.nama));
return`<div class="trkbox">
<h4>📊 Status Pesanan Peserta</h4>
<div class="trkrow">
<div class="trksc"><div class="v ok">${ok}</div><div class="l">Sudah order</div></div>
<div class="trksc"><div class="v pending">${tot-ok}</div><div class="l">Belum order</div></div>
<div class="trksc"><div class="v">${pct}%</div><div class="l">Progress</div></div>
</div>
<div class="trkbar"><div class="fill" style="width:${pct}%"></div></div>
${pending.length>0?`<button class="bcp" id="cp-pending" style="margin-top:6px">📋 Copy Senarai Belum Order (${pending.length})</button>`:'<p style="font-size:12px;color:#1a6b3c;text-align:center;font-weight:600">🎉 Semua peserta sudah order!</p>'}

const done=orderedNames.has(p.nama);
return`<div class="trkname ${done?'ok':'pending'}"><span class="stat">${done?'✅':'⏳'}</span><span style="flex:1">${p.nama}${p.isTL?' ⭐':''}</span></div>`;

function bPendingList(trip,orders){

if(S.loading){el.innerHTML=`<div class="loading">🍱<br><br>Memuatkan...</div>`;return;}
if(S.view==="notfound"){el.innerHTML=`<div class="loading">❌<br><br>Link trip tidak sah.</div>`;return;}

else if(S.view==="admin")el.innerHTML=rAdmin();
else if(S.view==="leader")el.innerHTML=rLeader();

attachEvents();
}

const tid=S.selTrip||S.tripId;
await delOrder(tid,b.dataset.del);
S.orders=S.orders.filter(o=>o.id!==b.dataset.del);
toast("✓ Pesanan dipadam.");render();
}));
on("reset-trip","click",async()=>{
if(!confirm("Padam SEMUA pesanan trip ini?"))return;
const tid=S.selTrip;
const snap=await getDocs(collection(db,"trips",tid,"orders"));
for(const d of snap.docs)await deleteDoc(d.ref);
S.orders=[];render();
});
// Export
on("cp-fuji","click",()=>{const t=S.trips.find(t=>t.id===S.selTrip);if(t)cp(bFuji(t,S.orders));});
on("cp-nara","click",()=>{const t=S.trips.find(t=>t.id===S.selTrip);if(t)cp(bNara(t,S.orders));});
on("cp-namba","click",()=>{const t=S.trips.find(t=>t.id===S.selTrip);if(t)cp(bNamba(t,S.orders));});
on("cp-leader","click",()=>{const t=S.trips.find(t=>t.id===S.selTrip);if(t)cp(bLeader(t,S.orders));});
on("cp-ringkasan","click",()=>{const t=S.trips.find(t=>t.id===S.selTrip);if(t)cp(bRingkasan(t,S.orders));});
// Special menu
on("sp-nama","input",e=>S.addSpecial=e.target.value);
on("add-special","click",async()=>{
const nama=S.addSpecial.trim();if(!nama)return;
const tid=S.selTrip;const trip=S.trips.find(t=>t.id===tid);if(!trip)return;
const sesi=trip.sesi||SESI;const namba=sesi.find(s=>s.id==="namba");if(!namba)return;
namba.menus.push({id:Date.now(),name:nama,price:1000,desc:"Special/Vegan",isSpecial:true});
await setDoc(doc(db,"trips",tid),trip);S.addSpecial="";toast(`✓ "${nama}" ditambah!`);render();
});
// Images
on("bulk-pick","change",async e=>{
const files=Array.from(e.target.files);
if(!files.length)return;
S.pickedFiles=files;S.pendingImgs={};S.selectingFileIdx=null;
toast("⏳ Memproses gambar...");
S.imgPreviews=await Promise.all(files.map(f=>compressImg(f,300)));
render();
});
document.querySelectorAll(".igitem").forEach(item=>item.addEventListener("click",()=>{S.selectingFileIdx=parseInt(item.dataset.fileidx);render();}));
on("close-modal","click",()=>{S.selectingFileIdx=null;render();});
on("modal-overlay","click",e=>{if(e.target.id==="modal-overlay"){S.selectingFileIdx=null;render();}});
document.querySelectorAll(".modal-item").forEach(item=>item.addEventListener("click",async()=>{
const key=item.dataset.key;const fi=parseInt(item.dataset.fi);
Object.keys(S.pendingImgs).forEach(k=>{if(S.pendingImgs[k].fileIdx===fi||k===key)delete S.pendingImgs[k];});
S.pendingImgs[key]={fileIdx:fi,preview:S.imgPreviews[fi],file:S.pickedFiles[fi]};
S.selectingFileIdx=null;render();
}));
on("remove-assign","click",()=>{
const fi=S.selectingFileIdx;
Object.keys(S.pendingImgs).forEach(k=>{if(S.pendingImgs[k].fileIdx===fi)delete S.pendingImgs[k];});
S.selectingFileIdx=null;render();
});
on("save-imgs","click",async()=>{
const keys=Object.keys(S.pendingImgs);if(!keys.length)return;
toast("⏳ Menyimpan gambar...");
let saved=0;
for(const key of keys){
try{
S.imgs[key]=S.pendingImgs[key].preview;
await setDoc(doc(db,"config","menuImgs","items",key),{url:S.pendingImgs[key].preview});
saved++;
}catch(e){
console.error("Gagal simpan:",key,e);
toast(`❌ Gambar "${key}" masih terlalu besar. Cuba gambar lebih kecil.`);
}
}
S.pendingImgs={};S.pickedFiles=[];S.imgPreviews=[];
if(saved>0)toast(`✓ ${saved} gambar disimpan!`);
render();
});
// Order
on("order-name","input",e=>S.form.name=e.target.value);
on("cnt-minus","click",()=>{S.form.pax=Math.max(1,S.form.pax-1);render();});
on("cnt-plus","click",()=>{
const trip=S.tripData;const pax=trip?trip.pax:22;
const used=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);
S.form.pax=Math.min(S.form.pax+1,pax-used);render();
});
document.querySelectorAll("[data-ptab]").forEach(b=>b.addEventListener("click",()=>{S.activePerson=parseInt(b.dataset.ptab);render();}));
on("next-step","click",async()=>{
const trip=S.tripData;const sl=trip.sesi||SESI;
const pax=trip?trip.pax:22;
const used=S.orders.reduce((s,o)=>s+((o.persons||[]).length||1),0);const rem=pax-used;
if(S.step===1){
const name=$("order-name")?.value?.trim()||S.form.name.trim();
S.form.name=name;
if(!name){S.formErr="Sila masukkan nama anda.";render();return;}
if(findOrderByName(name,S.orders)){S.formErr="Nama ini sudah membuat pesanan. Klik 'Semak Order Saya' untuk edit.";render();return;}
if(rem<=0){S.formErr="Slot pesanan sudah penuh.";render();return;}
if(S.form.pax>rem){S.formErr=`Hanya ${rem} slot tinggal.`;render();return;}
// Validation: jika trip ada senarai peserta, semak nama
if(trip.peserta&&trip.peserta.length>0){
const m=fuzzyMatchPeserta(name,trip.peserta);
if(!m){
const ok=confirm(`⚠️ Nama "${name}" tidak ditemui dalam senarai peserta.\n\nSila semak ejaan, atau klik OK jika anda pasti nama anda betul untuk teruskan.`);
if(!ok){S.formErr="Sila semak ejaan nama anda atau hubungi Tour Leader.";render();return;}
} else if(m.confidence==="partial"){
S.form.name=m.match.nama;
}
}
S.form.persons=Array.from({length:S.form.pax},()=>({}));
S.sesiIdx=0;S.activePerson=0;S.formErr="";S.step=2;render();
} else {
const sesi=sl[S.sesiIdx];
const allFilled=S.form.persons.every(p=>p[sesi.id]);
if(!allFilled){
const missing=S.form.persons.findIndex(p=>!p[sesi.id]);
S.activePerson=missing;S.formErr=`Sila pilih menu untuk semua ${S.form.pax} orang.`;render();return;
}
S.formErr="";
if(S.sesiIdx===sl.length-1){
const isEdit=S.editing.active;
const order={id:isEdit?S.editing.orderId:genId(),name:S.form.name,persons:S.form.persons};
await saveOrder(S.tripId,order);
if(isEdit){
S.lastWasEdit=true;
const back=S.editing.origView;
const trip=S.tripId;
S.editing={active:false,orderId:null,origView:null,returnSelTrip:null};
if(back==="check"){S.submitted=true;render();}
else if(back==="leader"||back==="admin"){
S.view=back;S.step=1;S.submitted=false;S.form={name:"",pax:1,persons:[]};
await loadOrders(S.selTrip||trip);render();toast("✓ Perubahan disimpan!");
} else {S.submitted=true;render();}
} else {
S.lastWasEdit=false;S.submitted=true;render();
}
} else {S.sesiIdx++;S.activePerson=0;render();}
}
});
on("prev-step","click",()=>{
if(S.editing.active&&S.sesiIdx===0){
if(confirm("Batal edit? Perubahan tidak akan disimpan."))cancelEdit();
return;
}
if(S.sesiIdx>0){S.sesiIdx--;S.activePerson=0;S.formErr="";}
else{S.step=1;S.formErr="";}render();
});
document.querySelectorAll(".mcard").forEach(c=>c.addEventListener("click",()=>{
const sid=c.dataset.sesi;const pid=parseInt(c.dataset.pid);const mid=parseInt(c.dataset.mid);
const trip=S.tripData;const sl=trip.sesi||SESI;
const sesi=sl.find(s=>s.id===sid);if(!sesi)return;
const menu=sesi.menus.find(m=>m.id===mid);if(!menu)return;
if(!S.form.persons[pid])S.form.persons[pid]={};
S.form.persons[pid][sid]=menu;S.formErr="";
const next=S.form.persons.findIndex((p,i)=>i>pid&&!p[sid]);
if(next!==-1)S.activePerson=next;
render();
}));
on("skip-sesi","click",()=>{
const trip=S.tripData;const sl=trip.sesi||SESI;
const sesi=sl[S.sesiIdx];if(!sesi)return;
const ap=S.activePerson;
if(!S.form.persons[ap])S.form.persons[ap]={};
const cur=S.form.persons[ap][sesi.id];
if(cur&&cur.skip){delete S.form.persons[ap][sesi.id];}
else{S.form.persons[ap][sesi.id]={skip:true,name:"Tidak order"};
const next=S.form.persons.findIndex((p,i)=>i>ap&&!p[sesi.id]);
if(next!==-1)S.activePerson=next;}
S.formErr="";render();
});
// Check order
on("go-check","click",()=>{S.view="check";S.checkName="";S.checkDone=false;render();});
on("check-inp","input",e=>S.checkName=e.target.value);
on("do-check","click",()=>{S.checkName=$("check-inp")?.value?.trim()||"";S.checkDone=true;render();});
on("check-inp","keydown",e=>{if(e.key==="Enter")$("do-check")?.click();});
}
// ── Init ──────────────────────────────────────────
window.addEventListener("DOMContentLoaded",async()=>{
try{
const params=new URLSearchParams(location.search);
const tid=params.get("trip");
if(tid){
const d=await getDoc(doc(db,"trips",tid));
if(d.exists()){
S.tripId=tid;S.tripData={id:tid,...d.data()};
await loadOrders(tid);await loadImgs();
listenOrders(tid);S.view="order";
} else {
S.view="notfound";
}
}
await loadTrips();await loadImgs();
if(S.trips.length>0)S.selTrip=S.trips[0].id;
}catch(e){console.error(e);}
S.loading=false;render();
});
</script>
</body>
</html>
